            {(question.options || []).map((optRaw, i) => {
              const opt = normOption(optRaw);
              return (
                <div key={i} className="flex items-center gap-2">
                  <span className="font-bold w-6">{String.fromCharCode(65 + i)})</span>
                  <input
                    type="text"
                    value={opt.text}
                    onChange={(e) => {
                      const newOpts = (question.options || []).map((o, j) => j === i ? { ...normOption(o), text: e.target.value } : o);
                      update({ options: newOpts });
                    }}
                    className="flex-1 border border-slate-300 rounded px-2 py-1 text-sm"
                    placeholder={`Seçenek ${String.fromCharCode(65 + i)}`}
                  />
                </div>
              );
            })}
          </div>
        </div>
      )}

      {question.type === 'tf' && (
        <div className="border-t border-slate-200 pt-3 text-sm text-slate-600">
          Doğru/Yanlış seçenekleri yazılı kağıdında otomatik gösterilecek (D / Y).
        </div>
      )}

      {question.type === 'fill' && (
        <div className="border-t border-slate-200 pt-3 text-sm text-slate-600">
          Boşluk doldurma sorusu. Soru metninde boşluk göstermek için <code className="bg-slate-100 px-1">_____</code> kullanın.
        </div>
      )}

      {showLatex && <LatexEditor onInsert={insertLatex} onClose={() => { setShowLatex(false); setShapeTarget(null); }} />}
      {showNumberLine && (
        <NumberLineEditor
          initial={editingShapeId ? shapes.find(s => s.id === editingShapeId)?.data : null}
          onSave={(data) => {
            if (editingShapeId) {
              // Mevcut sayı doğrusunu güncelle
              updateShapeData(editingShapeId, data);
            } else if (shapeTarget?.itemId) {
              // Maddeye ekle
              addShapeToItem(shapeTarget.itemId, { type: 'numberLine', data });
            } else {
              // Yeni sayı doğrusu ekle (yerleşim sorulacak)
              requestAddShape({ type: 'numberLine', data });
            }
          }}
          onClose={() => { setShowNumberLine(false); setEditingShapeId(null); setShapeTarget(null); }}
        />
      )}
      {cropSrc && (
        <ImageCropper
          src={cropSrc}
          onCrop={(dataUrl) => {
            if (shapeTarget?.itemId) {
              addShapeToItem(shapeTarget.itemId, { type: 'image', data: dataUrl });
            } else {
              requestAddShape({ type: 'image', data: dataUrl });
            }
          }}
          onClose={() => { setCropSrc(null); setShapeTarget(null); }}
        />
      )}
      {pdfFile && (
        <PdfPagePicker
          file={pdfFile}
          onPageSelected={(dataUrl) => setCropSrc(dataUrl)}
          onClose={() => setPdfFile(null)}
        />
      )}
      {pendingShape && (
        <ShapeLayoutPicker
          onPick={confirmAddShape}
          onCancel={() => setPendingShape(null)}
        />
      )}
      {chartEditor && (
        <ChartEditor
          chartType={chartEditor.chartType}
          initial={
            chartEditor.itemId
              ? ((items.find(it => it.id === chartEditor.itemId)?.shapes || []).find(s => s.id === chartEditor.editingId)?.data ?? null)
              : (chartEditor.editingId ? shapes.find(s => s.id === chartEditor.editingId)?.data : null)
          }
          onSave={(data) => {
            if (chartEditor.itemId) {
              // Maddeye ekle veya maddedeki şekli güncelle
              const it = items.find(x => x.id === chartEditor.itemId);
              const itShapes = it?.shapes || [];
              if (chartEditor.editingId) {
                updateItem(chartEditor.itemId, { shapes: itShapes.map(s => s.id === chartEditor.editingId ? { ...s, data } : s) });
              } else {
                updateItem(chartEditor.itemId, { shapes: [...itShapes, { id: uniqueId(), type: data.chartType, data, layout: 'below' }] });
              }
            } else if (chartEditor.editingId) {
              updateShapeData(chartEditor.editingId, data);
            } else {
              requestAddShape({ type: data.chartType, data });
            }
          }}
          onClose={() => setChartEditor(null)}
        />
      )}
    </div>
  );
};

// QuestionEditor memo ile sarılı — sadece prop'u değişen sorular re-render olur
const QuestionEditor = React.memo(QuestionEditorImpl);

// Her soru için callback'leri stabil tutan wrapper.
// Parent'tan questionId + global updateQuestion/deleteQuestion/moveQuestion + index alır,
// içinde useCallback ile stabil callback'ler oluşturur. Böylece question değişmediyse
// QuestionEditor re-render olmaz.
const QuestionEditorRowImpl = ({ question, index, totalQuestions, updateQuestion, deleteQuestion, moveQuestion, makeDragHandlers, isDragging, isDragOver }) => {
  const qId = question.id;
  const onChange = useCallback((nq) => updateQuestion(qId, nq), [qId, updateQuestion]);
  const onDelete = useCallback(() => deleteQuestion(qId), [qId, deleteQuestion]);
  const onMoveUp = useCallback(() => moveQuestion(index, index - 1), [index, moveQuestion]);
  const onMoveDown = useCallback(() => moveQuestion(index, index + 1), [index, moveQuestion]);
  const dragHandlers = useMemo(() => makeDragHandlers(qId), [qId, makeDragHandlers]);
  return (
    <QuestionEditor
      question={question}
      index={index}
      totalQuestions={totalQuestions}
      onChange={onChange}
      onDelete={onDelete}
      onMoveUp={onMoveUp}
      onMoveDown={onMoveDown}
      canMoveUp={index > 0}
      canMoveDown={index < totalQuestions - 1}
      dragHandlers={dragHandlers}
      isDragging={isDragging}
      isDragOver={isDragOver}
    />
  );
};

const QuestionEditorRow = React.memo(QuestionEditorRowImpl);

// ============== YAZILI KAĞIDI ÇIKTI BILEŞENI ==============

const QuestionDisplayImpl = ({ question, index, halfWidth = false }) => {
  // KaTeX yüklendiğinde re-render için (içerikte $...$ varsa otomatik düzgün gösterilsin)
  useKatex();

  const bgStyle = (() => {
    switch (question.background) {
      case 'grid':
        return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '5mm 5mm' };
      case 'dotted':
        return { backgroundImage: 'radial-gradient(#94a3b8 0.5px, transparent 0.5px)', backgroundSize: '5mm 5mm' };
      case 'lined':
        return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '100% 7mm' };
      default:
        return {};
    }
  })();

  // Şekilleri al (geriye dönük uyum: eski numberLine ve images da dahil)
  const shapes = (() => {
    if (question.shapes && question.shapes.length > 0) return question.shapes;
    const out = [];
    if (question.numberLine) {
      out.push({ id: 'legacy-nl', type: 'numberLine', data: question.numberLine, layout: 'below' });
    }
    if (question.images && question.images.length > 0) {
      question.images.forEach((img, i) => {
        out.push({ id: `legacy-img-${i}`, type: 'image', data: img, layout: 'below' });
      });
    }
    return out;
  })();

  // Şekilleri satırlara grupla: 'below' olan yeni satır başlatır, 'side' aynı satırda devam eder
  const shapeRows = (() => {
    const rows = [];
    shapes.forEach((shape, i) => {
      if (i === 0 || shape.layout !== 'side') {
        rows.push([shape]);
      } else {
        rows[rows.length - 1].push(shape);
      }
    });
    return rows;
  })();

  // Tek bir şekli render et — kapsayıcı genişliğine sığar
  const renderShape = (shape) => {
    if (shape.type === 'numberLine') {
      return <NumberLineDisplay data={shape.data} />;
    }
    if (shape.type === 'image') {
      return (
        <img
          src={shape.data}
          alt=""
          style={{ maxWidth: '100%', maxHeight: '60mm', height: 'auto', display: 'block', margin: '0 auto' }}
        />
      );
    }
    // Tablo/grafik türleri
    if (CHART_TYPE_LABELS[shape.type]) {
      return <ChartDisplay data={shape.data} />;
    }
    return null;
  };

  // Şekiller bloğu (üst/alt yerleşim için tekrar kullanılacak)
  const renderShapesBlock = () => {
    if (shapes.length === 0) return null;
    return (
      <div className="my-2">
        {shapeRows.map((row, ri) => (
          <div
            key={ri}
            className={row.length > 1 ? 'grid gap-3 mb-2' : 'mb-2'}
            style={row.length > 1 ? { gridTemplateColumns: `repeat(${row.length}, minmax(0, 1fr))` } : {}}
          >
            {row.map(shape => (
              <div key={shape.id} className="flex items-center justify-center min-w-0">
                {renderShape(shape)}
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  };

  // Şekillerin pozisyonu (varsayılan: üstte). Eski numberLinePos ile uyumlu olalım.
  const shapesPos = question.shapesPos || question.numberLinePos || 'above';

  return (
    <div className="question-block" data-question-id={question.id} style={{ marginBottom: `${question.gapMm ?? 5}mm` }}>
      {question.showLearning && question.learning && (
        <div className="text-xs italic text-slate-600 mb-1">Kazanım: {question.learning}</div>
      )}
      <div className="flex items-start gap-2 mb-1">
        <span className="font-bold whitespace-nowrap" style={styleToCSS(question.textStyle)}>
          {index + 1}){question.showPoints !== false && <span className="text-sm"> ({question.points} puan)</span>}
        </span>
      </div>

      {shapesPos === 'above' && renderShapesBlock()}

      <div style={styleToCSS(question.textStyle)} className="question-text mb-2"
           dangerouslySetInnerHTML={{ __html: renderQuestionText(question.text) }} />

      {shapesPos === 'below' && renderShapesBlock()}

      {/* Alt maddeler */}
      {(question.items || []).length > 0 && (
        <div className="mt-2 space-y-2">
          {question.items.map((it) => {
            const itemBg = (() => {
              switch (it.background) {
                case 'grid':
                  return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '5mm 5mm' };
                case 'dotted':
                  return { backgroundImage: 'radial-gradient(#94a3b8 0.5px, transparent 0.5px)', backgroundSize: '5mm 5mm' };
                case 'lined':
                  return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '100% 7mm' };
                default:
                  return {};
              }
            })();
            return (
              <div key={it.id}>
                <div style={styleToCSS(question.textStyle)} className="flex items-start gap-1">
                  <span className="font-bold whitespace-nowrap">{it.label}</span>
                  <span className="flex-1">
                    <span dangerouslySetInnerHTML={{ __html: renderQuestionText(it.text) }} />
                    {it.hasPoints && it.points !== '' && (
                      <span className="text-sm"> ({it.points} puan)</span>
                    )}
                  </span>
                </div>
                {/* Maddedeki grafikler */}
                {(it.shapes || []).length > 0 && (
                  <div className="my-1 flex flex-wrap gap-3 justify-center">
                    {it.shapes.map((sh) => (
                      <div key={sh.id} style={{ maxWidth: 280, flex: '1 1 200px' }}>
                        {sh.type === 'numberLine' ? <NumberLineDisplay data={sh.data} />
                          : sh.type === 'image' ? <img src={sh.data} alt="" style={{ maxWidth: '100%', maxHeight: '60mm' }} />
                          : <ChartDisplay data={sh.data} />}
                      </div>
                    ))}
                  </div>
                )}
                {it.hasAnswer && (
                  <div
                    className="mt-1 border border-slate-400"
                    style={{ height: `${it.answerHeight || 25}mm`, ...itemBg }}
                  />
                )}
              </div>
            );
          })}
        </div>
      )}

      {question.type === 'multiple' && (
        <div className={`grid ${halfWidth ? 'grid-cols-1' : 'grid-cols-2'} gap-x-4 gap-y-1 mt-2`}>
          {(question.options || []).map((optRaw, i) => {
            const opt = normOption(optRaw);
            return (
              <div key={i} style={styleToCSS(question.textStyle)}>
                <span className="font-bold">{String.fromCharCode(65 + i)})</span> <span dangerouslySetInnerHTML={{ __html: renderQuestionText(opt.text) }} />
              </div>
            );
          })}
        </div>
      )}

      {question.type === 'tf' && (
        <div className="flex gap-6 mt-2" style={styleToCSS(question.textStyle)}>
          <div>(   ) Doğru</div>
          <div>(   ) Yanlış</div>
        </div>
      )}

      {question.type === 'open' && (question.items || []).length === 0 && (
        <div
          className="mt-1 border border-slate-400"
          style={{
            height: `${question.answerHeight || 40}mm`,
            ...bgStyle
          }}
        />
      )}

      {(question.type === 'multiple' || question.type === 'tf' || question.type === 'fill') && question.background !== 'none' && (
        <div
          className="mt-2 border border-slate-400"
          style={{
            height: `${question.answerHeight || 20}mm`,
            ...bgStyle
          }}
        />
      )}
    </div>
  );
};

// ============== ANA UYGULAMA ==============

function YaziliApp() {
  const [meta, setMeta] = useState({
    schoolName: '',
    academicYear: '2025-2026',
    subject: '',
    grade: '',
    term: 'II',
    examNumber: 'I',
    endNote: ''
  });

  const [headerStyle, setHeaderStyle] = useState(defaultStyle(14));
  const [endNoteStyle, setEndNoteStyle] = useState(defaultStyle(11));

  const [questions, setQuestions] = useState([]);
  const [view, setView] = useState('edit'); // edit | preview
  const [dragState, setDragState] = useState({ draggedId: null, overId: null });
  const [showSavePanel, setShowSavePanel] = useState(false); // Yazılılarım paneli
  const [pdfBusy, setPdfBusy] = useState(false); // PDF üretiliyor mu
  const [saveName, setSaveName] = useState(''); // Kaydetme için isim
  const [savedList, setSavedList] = useState([]); // localStorage'daki yazılılar
  const printRef = useRef(null);

  const STORAGE_KEY = 'mb-yazili-kayitlar';

  // localStorage erişimi güvenli (artifact'te çalışmayabilir)
  const safeStorage = {
    get: () => {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) { return null; }
    },
    set: (obj) => {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
        return true;
      } catch (e) { return false; }
    }
  };

  // Kayıtlı yazılı listesini yenile
  const refreshSavedList = React.useCallback(() => {
    const all = safeStorage.get();
    if (all === null) { setSavedList(null); return; } // null = localStorage yok
    const list = Object.entries(all).map(([name, data]) => ({
      name,
      savedAt: data._savedAt || 0,
      questionCount: (data.questions || []).length
    })).sort((a, b) => b.savedAt - a.savedAt);
    setSavedList(list);
  }, []);

  // Panel açılınca listeyi yükle
  useEffect(() => {
    if (showSavePanel) refreshSavedList();
  }, [showSavePanel, refreshSavedList]);

  // Mevcut durumu bir nesne olarak topla
  const collectState = () => ({
    meta, headerStyle, endNoteStyle, questions,
    _savedAt: Date.now(),
    _version: 1
  });

  // Bir durumu uygula (yükleme)
  const applyState = (data) => {
    if (!data) return;
    if (data.meta) setMeta(data.meta);
    if (data.headerStyle) setHeaderStyle(data.headerStyle);
    if (data.endNoteStyle) setEndNoteStyle(data.endNoteStyle);
    if (Array.isArray(data.questions)) setQuestions(data.questions);
    setView('edit');
  };

  // localStorage'a kaydet
  const saveToStorage = (name) => {
    const trimmed = (name || '').trim();
    if (!trimmed) { alert('Lütfen yazılıya bir isim verin.'); return; }
    const all = safeStorage.get();
    if (all === null) {
      alert('Bu ortamda tarayıcı kaydı kullanılamıyor. Bunun yerine "JSON indir" ile dosyaya kaydedebilirsiniz.');
      return;
    }
    if (all[trimmed] && !window.confirm(`"${trimmed}" zaten var. Üzerine yazılsın mı?`)) return;
    all[trimmed] = collectState();
    if (safeStorage.set(all)) {
      setSaveName('');
      refreshSavedList();
      alert(`"${trimmed}" kaydedildi.`);
    } else {
      alert('Kaydedilemedi (tarayıcı hafızası dolu olabilir).');
    }
  };

  // localStorage'dan yükle
  const loadFromStorage = (name) => {
    const all = safeStorage.get();
    if (!all || !all[name]) return;
    if (questions.length > 0 && !window.confirm('Mevcut yazılının üzerine yüklensin mi? Kaydedilmemiş değişiklikler kaybolur.')) return;
    applyState(all[name]);
    setShowSavePanel(false);
  };

  // localStorage'dan sil
  const deleteFromStorage = (name) => {
    if (!window.confirm(`"${name}" silinsin mi?`)) return;
    const all = safeStorage.get();
    if (!all) return;
    delete all[name];
    safeStorage.set(all);
    refreshSavedList();
  };

  // JSON dosyası olarak indir
  const exportJson = () => {
    const data = collectState();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = (meta.subject || 'yazili').replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ ]/g, '').trim() || 'yazili';
    a.href = url;
    a.download = `${fname}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // JSON dosyasından yükle
  const importJson = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (questions.length > 0 && !window.confirm('Mevcut yazılının üzerine yüklensin mi? Kaydedilmemiş değişiklikler kaybolur.')) return;
        applyState(data);
        setShowSavePanel(false);
        alert('Yazılı yüklendi.');
      } catch (err) {
        alert('Dosya okunamadı. Geçerli bir MB-Yazılı yedek dosyası değil.');
      }
    };
    reader.readAsText(file);
  };

  const addQuestion = React.useCallback(() => {
    setQuestions(prev => [...prev, {
      id: uniqueId(),
      type: 'open',
      points: 10,
      text: '',
      textStyle: defaultStyle(12),
      background: 'none',
      answerHeight: 40,
      shapes: [], // [{ id, type: 'numberLine'|'image', data, layout: 'below'|'side' }]
      items: [], // alt maddeler: [{ id, label, text, points, hasPoints, hasAnswer, answerHeight, background }]
      options: ['', '', '', ''],
      nextLayout: 'below',
      gapMm: 5,
      showLearning: false,
      learning: ''
    }]);
  }, []);

  const updateQuestion = React.useCallback((id, q) => {
    setQuestions(prev => prev.map(x => x.id === id ? q : x));
  }, []);

  const deleteQuestion = React.useCallback((id) => {
    setQuestions(prev => prev.filter(x => x.id !== id));
  }, []);

  const moveQuestion = React.useCallback((fromIdx, toIdx) => {
    setQuestions(prev => {
      if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= prev.length || toIdx >= prev.length) return prev;
      const newQs = [...prev];
      const [moved] = newQs.splice(fromIdx, 1);
      newQs.splice(toIdx, 0, moved);
      return newQs;
    });
  }, []);

  // Touch sürükleme için ek state (mobil)
  const touchDragRef = useRef({ active: false, draggedId: null, startY: 0, lastY: 0 });
  // Auto-scroll animasyon ref'i
  const autoScrollRafRef = useRef(null);

  // Auto-scroll loop: parmak ekran kenarına yakınsa otomatik kaydır
  // Ayrıca her frame'de hangi sorunun üzerinde olduğumuzu güncelle (scroll sırasında bile)
  const startAutoScroll = useCallback(() => {
    const tick = () => {
      if (!touchDragRef.current.active) {
        autoScrollRafRef.current = null;
        return;
      }
      const y = touchDragRef.current.lastY;
      const x = touchDragRef.current.lastX || window.innerWidth / 2;
      const h = window.innerHeight;
      // Üst veya alt %20'lik bölgede mi?
      const edge = h * 0.20;
      let scrollBy = 0;
      if (y < edge) {
        const ratio = Math.min(1, (edge - y) / edge);
        scrollBy = -Math.max(6, Math.floor(ratio * 22));
      } else if (y > h - edge) {
        const ratio = Math.min(1, (y - (h - edge)) / edge);
        scrollBy = Math.max(6, Math.floor(ratio * 22));
      }
      if (scrollBy !== 0) {
        try { window.scrollBy(0, scrollBy); } catch(e) {}
        try {
          if (document.scrollingElement) {
            document.scrollingElement.scrollTop += scrollBy;
          }
        } catch(e) {}
        try { document.documentElement.scrollTop += scrollBy; } catch(e) {}
        try { document.body.scrollTop += scrollBy; } catch(e) {}
      }

      // Her tick'te hangi sorunun üzerindeyiz hesapla (scroll sırasında bile güncel kalsın)
      const allBlocks = document.querySelectorAll('[data-question-id]');
      let overId = null;
      for (const block of allBlocks) {
        const rect = block.getBoundingClientRect();
        if (y >= rect.top && y <= rect.bottom) {
          const id = parseInt(block.getAttribute('data-question-id'));
          if (id && id !== touchDragRef.current.draggedId) {
            overId = id;
          }
          break;
        }
      }
      if (overId !== dragStateRef.current.overId) {
        setDragState(s => ({ ...s, overId }));
      }

      autoScrollRafRef.current = requestAnimationFrame(tick);
    };
    if (!autoScrollRafRef.current) {
      autoScrollRafRef.current = requestAnimationFrame(tick);
    }
  }, []);

  const stopAutoScroll = useCallback(() => {
    if (autoScrollRafRef.current) {
      cancelAnimationFrame(autoScrollRafRef.current);
      autoScrollRafRef.current = null;
    }
  }, []);

  // Component unmount olursa RAF'i temizle
  useEffect(() => {
    return () => {
      if (autoScrollRafRef.current) cancelAnimationFrame(autoScrollRafRef.current);
    };
  }, []);

  // questions'a stable referans için (closure'larda en güncel değeri okumak için)
  const questionsRef = useRef(questions);
  useEffect(() => { questionsRef.current = questions; }, [questions]);
  // dragState'i ref'te de tut ki callback'ler en güncelini okusun
  const dragStateRef = useRef(dragState);
  useEffect(() => { dragStateRef.current = dragState; }, [dragState]);

  // Drag handlers oluşturucu — useCallback ile stabil, her sorunun handler'ı aynı kalır
  const makeDragHandlers = useCallback((questionId) => ({
    dragHandle: {
      draggable: true,
      onDragStart: (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(questionId));
        setDragState({ draggedId: questionId, overId: null });
      },
      onDragEnd: () => {
        setDragState({ draggedId: null, overId: null });
      },
      onTouchStart: (e) => {
        const y = e.touches[0].clientY;
        const x = e.touches[0].clientX;
        touchDragRef.current = { active: true, draggedId: questionId, startY: y, lastY: y, lastX: x };
        setDragState({ draggedId: questionId, overId: null });
        startAutoScroll();
      },
      onTouchMove: (e) => {
        if (!touchDragRef.current.active) return;
        e.preventDefault();
        const touch = e.touches[0];
        // Son pozisyonu kaydet (auto-scroll için)
        touchDragRef.current.lastY = touch.clientY;
        touchDragRef.current.lastX = touch.clientX;

        // Tüm soru kutularını bul ve Y aralıklarına göre eşle (elementFromPoint'tan daha sağlam)
        const allBlocks = document.querySelectorAll('[data-question-id]');
        let overId = null;
        for (const block of allBlocks) {
          const rect = block.getBoundingClientRect();
          // Parmak bu kutunun dikey aralığında mı?
          if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
            const id = parseInt(block.getAttribute('data-question-id'));
            if (id && id !== touchDragRef.current.draggedId) {
              overId = id;
            }
            break;
          }
        }
        if (overId !== dragStateRef.current.overId) {
          setDragState(s => ({ ...s, overId }));
        }
      },
      onTouchEnd: () => {
        const { draggedId } = touchDragRef.current;
        const overId = dragStateRef.current.overId;
        if (draggedId && overId && draggedId !== overId) {
          const qs = questionsRef.current;
          const fromIdx = qs.findIndex(q => q.id === draggedId);
          const toIdx = qs.findIndex(q => q.id === overId);
          if (fromIdx !== -1 && toIdx !== -1) moveQuestion(fromIdx, toIdx);
        }
        touchDragRef.current = { active: false, draggedId: null, startY: 0, lastY: 0, lastX: 0 };
        stopAutoScroll();
        setDragState({ draggedId: null, overId: null });
      },
      onTouchCancel: () => {
        touchDragRef.current = { active: false, draggedId: null, startY: 0, lastY: 0, lastX: 0 };
        stopAutoScroll();
        setDragState({ draggedId: null, overId: null });
      }
    },
    dropZone: {
      'data-question-id': questionId,
      onDragOver: (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const ds = dragStateRef.current;
        if (ds.draggedId && ds.draggedId !== questionId && ds.overId !== questionId) {
          setDragState(s => ({ ...s, overId: questionId }));
        }
      },
      onDragLeave: () => {
        if (dragStateRef.current.overId === questionId) {
          setDragState(s => ({ ...s, overId: null }));
        }
      },
      onDrop: (e) => {
        e.preventDefault();
        const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
        if (!draggedId || draggedId === questionId) {
          setDragState({ draggedId: null, overId: null });
          return;
        }
        const qs = questionsRef.current;
        const fromIdx = qs.findIndex(q => q.id === draggedId);
        const toIdx = qs.findIndex(q => q.id === questionId);
        if (fromIdx !== -1 && toIdx !== -1) {
          moveQuestion(fromIdx, toIdx);
        }
        setDragState({ draggedId: null, overId: null });
      }
    }
  }), [moveQuestion, startAutoScroll, stopAutoScroll]);

  // Soruları yan yana / alt alta gruplara böl
  // items yanında indices da tutuyoruz, böylece render'da questions.indexOf çağırmaya gerek kalmaz
  const groupedQuestions = useMemo(() => {
    const groups = [];
    let i = 0;
    while (i < questions.length) {
      if (questions[i].nextLayout === 'side' && i + 1 < questions.length) {
        groups.push({ type: 'side', items: [questions[i], questions[i + 1]], indices: [i, i + 1] });
        i += 2;
      } else {
        groups.push({ type: 'single', items: [questions[i]], indices: [i] });
        i += 1;
      }
    }
    return groups;
  }, [questions]);

  const handlePrint = () => {
    if (view !== 'preview') {
      setView('preview');
      // Render ve KaTeX'in oturması için yeterli süre
      setTimeout(() => window.print(), 500);
      return;
    }
    window.print();
  };

  const handleDownloadPDF = () => {
    // NOT: html2pdf (ekran görüntüsü -> resim) yöntemi telefonda kenar kesme,
    // boş sayfa ve sayfaya müdahale edip "Düzenle"ye geçişi bozma sorunları
    // çıkarıyordu. Bunun yerine tarayıcının KENDİ yazdırma motorunu kullanıyoruz:
    // gerçek A4 sayfasına, gerçek metinle basar; kenar kesmez, boş sayfa yapmaz
    // ve sayfa DOM'una hiç dokunmadığı için uygulamayı bozmaz.
    // Kullanıcı açılan ekrandan "PDF olarak kaydet"i seçer.
    if (view !== 'preview') {
      setView('preview');
      setTimeout(() => window.print(), 600);
      return;
    }
    window.print();
  };

  const handleDownloadWord = async (retry = 0) => {
    // Önizleme görünümünde değilse otomatik olarak geç ve bekle ki DOM hazırlansın
    if (view !== 'preview') {
      setView('preview');
      setTimeout(() => handleDownloadWord(0), 500);
      return;
    }

    // printRef henüz bağlanmadıysa birkaç kez tekrar dene
    if (!printRef.current) {
      if (retry < 10) {
        setTimeout(() => handleDownloadWord(retry + 1), 200);
        return;
      }
      alert('Önizleme henüz hazır değil. Lütfen önce "Önizle" sekmesine geçip birkaç saniye sonra tekrar deneyin.');
      return;
    }

    // Yazdırılacak sayfanın HTML'ini al
    const pageHtml = printRef.current.innerHTML;

    // KaTeX stillerini Word belgesine gömmek için al (yüklüyse)
    let katexCss = '';
    try {
      const katexLink = document.querySelector('link[data-katex]');
      if (katexLink) {
        const res = await fetch(katexLink.href);
        if (res.ok) katexCss = await res.text();
      }
    } catch (e) {
      // CORS veya başka bir sebepten yüklenmeyebilir; matematik biraz farklı görünebilir ama belge yine çalışır
      console.warn('KaTeX CSS Word belgesi için yüklenemedi:', e);
    }

    // Word'ün anlayacağı formatta tam bir HTML belgesi oluştur.
    const docTitle = `${meta.academicYear} Eğitim ve Öğretim Yılı ${meta.schoolName || '[Okul Adı]'} ${meta.grade || '[Sınıf Seviyesi]'} ${meta.term}. Dönem ${meta.examNumber}. ${meta.subject || '[Ders]'} Yazılısı`;
    const wordDoc = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>${docTitle}</title>
<!--[if gte mso 9]>
<xml>
  <w:WordDocument>
    <w:View>Print</w:View>
    <w:Zoom>100</w:Zoom>
    <w:DoNotOptimizeForBrowser/>
  </w:WordDocument>
</xml>
<![endif]-->
<style>
  @page {
    size: A4;
    margin: 15mm 15mm 15mm 15mm;
    mso-page-orientation: portrait;
  }
  body {
    font-family: 'Times New Roman', serif;
    font-size: 12pt;
    margin: 0;
    padding: 0;
  }
  div.print-page {
    width: 100%;
    padding: 0;
    margin: 0;
    box-shadow: none;
    background: white;
  }
  table { border-collapse: collapse; }
  .question-block { page-break-inside: avoid; }
  svg { display: inline-block; }
  ${katexCss}
</style>
</head>
<body>
${pageHtml}
</body>
</html>`;

    // Dosya adı
    const safeName = (meta.subject || 'Yazili')
      .replace(/[^\w\sğüşıöçĞÜŞİÖÇ-]/g, '')
      .trim()
      .replace(/\s+/g, '_');
    const fileName = `MB-Yazili_${safeName || 'Yazili'}_${meta.term || 'I'}D_${meta.examNumber || 'I'}Yazili.doc`;

    // İndirme tetikle (Blob yöntemi)
    let downloaded = false;
    try {
      const blob = new Blob(['\ufeff', wordDoc], { type: 'application/msword;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      downloaded = true;
    } catch (e) {
      console.warn('Blob indirme başarısız, yedek yönteme geçiliyor:', e);
    }

    // WebView/APK'da Blob çalışmazsa: data URI ile yeni sekmede aç
    if (!downloaded) {
      try {
        const dataUri = 'data:application/msword;charset=utf-8,' + encodeURIComponent('\ufeff' + wordDoc);
        const w = window.open(dataUri, '_blank');
        if (!w) {
          // Pop-up da engellendiyse aynı sekmede aç
          window.location.href = dataUri;
        }
      } catch (e) {
        alert('Word belgesi oluşturulamadı. Lütfen Chrome tarayıcısında açmayı deneyin.');
      }
    }
  };

  const titleText = `${meta.academicYear} Eğitim ve Öğretim Yılı ${meta.schoolName || '[Okul Adı]'} ${meta.grade || '[Sınıf Seviyesi]'} ${meta.term}. Dönem ${meta.examNumber}. ${meta.subject || '[Ders]'} Yazılısı`;

  return (
    <div className="min-h-screen bg-slate-100">
      <style>{`
        @media print {
          .no-print { display: none !important; }
          .print-page {
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
            width: auto !important;
            max-width: 100% !important;
            min-height: auto !important;
            box-sizing: border-box !important;
          }
          body { background: white !important; margin: 0 !important; }
          html { background: white !important; }
          .question-block { page-break-inside: avoid; }
        }
        @page {
          size: A4;
          margin: 15mm;
        }
        .print-page {
          width: 210mm;
          min-height: 297mm;
          padding: 15mm;
          background: white;
          margin: 1rem auto;
          box-shadow: 0 4px 20px rgba(0,0,0,0.1);
          box-sizing: border-box;
        }
        .latex-inline {
          display: inline-flex;
          align-items: center;
          vertical-align: middle;
        }
      `}</style>

      {/* Üst bar */}
      <div className="no-print bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3">
        <div className="max-w-6xl mx-auto">
          <h1 className="text-lg font-bold text-slate-800 text-center mb-2">📝 MB-Yazılı</h1>
          <div className="flex gap-2 flex-wrap justify-center">
            <button
              onClick={() => setView('edit')}
              className={`px-3 py-1.5 rounded text-sm ${view === 'edit' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-700'}`}
            >Düzenle</button>
            <button
              onClick={() => setView('preview')}
              className={`px-3 py-1.5 rounded text-sm ${view === 'preview' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-700'}`}
            >Önizle</button>
            <button onClick={() => handleDownloadWord(0)} className="px-3 py-1.5 rounded text-sm bg-indigo-600 text-white hover:bg-indigo-700 flex items-center gap-1">
              <FileText className="w-4 h-4" /> Word
            </button>
            <button onClick={() => handleDownloadPDF(0)} disabled={pdfBusy} className="px-3 py-1.5 rounded text-sm bg-green-600 text-white hover:bg-green-700 disabled:opacity-60 flex items-center gap-1">
              <Download className="w-4 h-4" /> {pdfBusy ? 'PDF hazırlanıyor...' : 'PDF'}
            </button>
            <button onClick={handlePrint} className="px-3 py-1.5 rounded text-sm bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-1">
              <Printer className="w-4 h-4" /> Yazdır
            </button>
            <button onClick={() => setShowSavePanel(true)} className="px-3 py-1.5 rounded text-sm bg-amber-500 text-white hover:bg-amber-600 flex items-center gap-1">
              <Save className="w-4 h-4" /> Yazılılarım
            </button>
          </div>
        </div>
      </div>

      {/* Yazılılarım paneli */}
      {showSavePanel && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto no-print">
          <div className="bg-white rounded-lg shadow-2xl max-w-lg w-full p-4 sm:p-6 my-2 sm:my-4">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-slate-800">Yazılılarım</h3>
              <button onClick={() => setShowSavePanel(false)} className="text-slate-500 hover:text-slate-700 text-2xl">×</button>
            </div>

            {/* Kaydet */}
            <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded">
              <div className="text-sm font-semibold text-slate-700 mb-2">Bu yazılıyı kaydet</div>
              <div className="flex gap-2">
                <input
                  type="text"
                  value={saveName}
                  onChange={(e) => setSaveName(e.target.value)}
                  placeholder="Yazılı adı (örn: 7A Matematik 1. Yazılı)"
                  className="flex-1 border border-slate-300 rounded px-2 py-1.5 text-sm"
                />
                <button onClick={() => saveToStorage(saveName)}
                  className="px-3 py-1.5 bg-amber-500 text-white rounded hover:bg-amber-600 text-sm whitespace-nowrap flex items-center gap-1">
                  <Save className="w-4 h-4" /> Kaydet
                </button>
              </div>
            </div>

            {/* Kayıtlı liste */}
            <div className="mb-4">
              <div className="text-sm font-semibold text-slate-700 mb-2">Kayıtlı yazılılar</div>
              {savedList === null ? (
                <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded">
                  Bu ortamda tarayıcı kaydı kullanılamıyor (örn. Claude önizlemesi). Gerçek sitede (Vercel) çalışır.
                  Şimdilik aşağıdaki <b>JSON indir</b> ile dosyaya kaydedebilirsiniz.
                </div>
              ) : savedList.length === 0 ? (
                <div className="text-xs text-slate-400">Henüz kayıt yok.</div>
              ) : (
                <div className="space-y-1 max-h-60 overflow-y-auto">
                  {savedList.map((item) => (
                    <div key={item.name} className="flex items-center gap-2 border border-slate-200 rounded p-2">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium truncate">{item.name}</div>
                        <div className="text-[11px] text-slate-400">
                          {item.questionCount} soru · {item.savedAt ? new Date(item.savedAt).toLocaleString('tr-TR') : ''}
                        </div>
                      </div>
                      <button onClick={() => loadFromStorage(item.name)}
                        className="px-2 py-1 text-xs bg-slate-700 text-white rounded hover:bg-slate-800 flex items-center gap-1">
                        <FolderOpen className="w-3 h-3" /> Aç
                      </button>
                      <button onClick={() => deleteFromStorage(item.name)}
                        className="p-1 text-red-500 hover:text-red-700">
                        <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* JSON dışa/içe aktar */}
            <div className="border-t border-slate-200 pt-3">
              <div className="text-sm font-semibold text-slate-700 mb-2">Dosyaya yedekle / geri yükle</div>
              <div className="text-[11px] text-slate-500 mb-2">
                Yazılıyı bilgisayarına/telefonuna dosya olarak indir, sonra istediğin zaman geri yükle. Her ortamda çalışır, başka cihaza taşıyabilirsin.
              </div>
              <div className="flex gap-2">
                <button onClick={exportJson}
                  className="flex-1 px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 text-sm flex items-center justify-center gap-1">
                  <Download className="w-4 h-4" /> JSON indir
                </button>
                <label className="flex-1 px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 text-sm flex items-center justify-center gap-1 cursor-pointer">
                  <Upload className="w-4 h-4" /> JSON yükle
                  <input type="file" accept="application/json,.json" onChange={importJson}
                    style={{ position: 'absolute', width: 1, height: 1, opacity: 0, pointerEvents: 'none' }} />
                </label>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Düzenleme görünümü */}
      {view === 'edit' && (
        <div className="max-w-4xl mx-auto p-4">
          {/* Yazılı bilgileri */}
          <div className="bg-white rounded-lg shadow p-4 mb-4">
            <h2 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Settings className="w-4 h-4" /> Yazılı Bilgileri</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-600">Okul Adı</label>
                <input type="text" value={meta.schoolName} onChange={(e) => setMeta({ ...meta, schoolName: e.target.value })}
                  placeholder="örn: 23 Nisan İmam Hatip Ortaokulu"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Eğitim Öğretim Yılı</label>
                <input type="text" value={meta.academicYear} onChange={(e) => setMeta({ ...meta, academicYear: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Ders Adı</label>
                <input type="text" value={meta.subject} onChange={(e) => setMeta({ ...meta, subject: e.target.value })}
                  placeholder="örn: Matematik"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Sınıf Seviyesi</label>
                <input type="text" value={meta.grade} onChange={(e) => setMeta({ ...meta, grade: e.target.value })}
                  placeholder="örn: 7. Sınıf"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Dönem</label>
                <select value={meta.term} onChange={(e) => setMeta({ ...meta, term: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1">
                  <option value="I">I. Dönem</option>
                  <option value="II">II. Dönem</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-600">Kaçıncı Yazılı</label>
                <select value={meta.examNumber} onChange={(e) => setMeta({ ...meta, examNumber: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1">
                  <option value="I">I. Yazılı</option>
                  <option value="II">II. Yazılı</option>
                  <option value="III">III. Yazılı</option>
                </select>
              </div>
            </div>

            <div className="mt-3">
              <label className="text-xs text-slate-600">Başlık yazı stili</label>
              <TextStyleControls style={headerStyle} onChange={setHeaderStyle} compact />
            </div>

            <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded">
              <div className="text-xs text-slate-500 mb-1">Başlık önizleme:</div>
              <div className="text-center" style={styleToCSS(headerStyle)}>{titleText}</div>
            </div>

            <div className="mt-4">
              <label className="text-xs text-slate-600">Yazılının sonuna eklenecek not (öğrencilere mesaj)</label>
              <textarea value={meta.endNote} onChange={(e) => setMeta({ ...meta, endNote: e.target.value })}
                placeholder="örn: Başarılar dilerim. Süre 40 dakikadır."
                className="w-full border border-slate-300 rounded p-2 mt-1 min-h-[60px]" />
              <div className="mt-2">
                <label className="text-xs text-slate-600">Son not yazı stili</label>
                <TextStyleControls style={endNoteStyle} onChange={setEndNoteStyle} compact />
              </div>
            </div>
          </div>

          {/* Sorular */}
          <div className="bg-white rounded-lg shadow p-4">
            <div className="flex justify-between items-center mb-3">
              <h2 className="font-bold text-slate-800">Sorular ({questions.length})</h2>
              <div className="text-sm text-slate-600">
                Toplam puan: <span className="font-bold">{questions.reduce((s, q) => s + (q.points || 0), 0)}</span>
              </div>
            </div>

            {questions.length > 1 && (
              <div className="text-xs text-slate-500 mb-2 bg-slate-50 border border-slate-200 rounded px-3 py-1.5">
                💡 Soruları yeniden sıralamak için sol baştaki <GripVertical className="inline w-3.5 h-3.5" /> tutamacından sürükleyin veya ok butonlarını kullanın.
              </div>
            )}

            {questions.map((q, i) => (
              <QuestionEditorRow
                key={q.id}
                question={q}
                index={i}
                totalQuestions={questions.length}
                updateQuestion={updateQuestion}
                deleteQuestion={deleteQuestion}
                moveQuestion={moveQuestion}
                makeDragHandlers={makeDragHandlers}
                isDragging={dragState.draggedId === q.id}
                isDragOver={dragState.overId === q.id && dragState.draggedId !== q.id}
              />
            ))}

            <button onClick={addQuestion} className="w-full border-2 border-dashed border-slate-300 rounded-lg py-4 text-slate-600 hover:bg-slate-50 flex items-center justify-center gap-2">
              <Plus className="w-5 h-5" /> Yeni Soru Ekle
            </button>
          </div>
        </div>
      )}

      {/* Önizleme / yazdırma görünümü */}
      {view === 'preview' && (
        <div ref={printRef}>
          <div className="print-page">
            {/* Başlık */}
            <div className="border-2 border-slate-800 p-3 mb-4">
              <div className="text-center" style={styleToCSS(headerStyle)}>
                {titleText}
              </div>
              <div className="grid grid-cols-4 gap-2 mt-3 text-sm" style={{ fontFamily: 'Times New Roman' }}>
                <div>Ad: ..........................</div>
                <div>Soyad: ..........................</div>
                <div>Numara: ..........................</div>
                <div>Sınıf: ..........................</div>
              </div>
              <div className="mt-2 text-right text-sm" style={{ fontFamily: 'Times New Roman' }}>
                <span className="inline-block border border-slate-800 px-4 py-1">
                  Puan: ........... / 100
                </span>
              </div>
            </div>

            {/* Sorular */}
            {groupedQuestions.map((group, gi) => {
              if (group.type === 'side') {
                return (
                  <div key={gi} className="grid grid-cols-2 gap-4">
                    <div className="border-r border-slate-300 pr-3">
                      <QuestionDisplay question={group.items[0]} index={group.indices[0]} halfWidth />
                    </div>
                    <div className="pl-3">
                      <QuestionDisplay question={group.items[1]} index={group.indices[1]} halfWidth />
                    </div>
                  </div>
                );
              }
              return (
                <QuestionDisplay key={gi} question={group.items[0]} index={group.indices[0]} />
              );
            })}

            {/* Son not */}
            {meta.endNote && (
              <div className="mt-6 pt-3 border-t border-slate-400" style={{ ...styleToCSS(endNoteStyle), whiteSpace: 'pre-wrap' }}>
                {meta.endNote}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    // ===== Uygulamayı başlat =====
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<YaziliApp />);
  </script>
  <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker
                .register("/serviceWorker.js")
                .then((registration) => {
                    console.log("SW registration successful");
                });
        });
    }
  </script>
</body>
</html>
