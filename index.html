const QuestionEditorImpl = ({ question, onChange, onDelete, onMoveUp, onMoveDown, canMoveUp, canMoveDown, index, totalQuestions, dragHandlers, isDragging, isDragOver }) => {
  const [showLatex, setShowLatex] = useState(false);
  const [showNumberLine, setShowNumberLine] = useState(false);
  const [editingShapeId, setEditingShapeId] = useState(null); // Düzenlenen sayı doğrusunun id'si (yoksa yeni şekil)
  const [cropSrc, setCropSrc] = useState(null);
  const [pdfFile, setPdfFile] = useState(null);
  const [pendingShape, setPendingShape] = useState(null); // Yerleşimi sorulan şekil { type, data }
  const [chartEditor, setChartEditor] = useState(null); // { chartType } yeni; veya { editingId, chartType } düzenleme
  // Sayı doğrusu / görsel / latex hangi hedefe ekleniyor? null = soru gövdesi, {itemId} = o madde
  const [shapeTarget, setShapeTarget] = useState(null);

  const update = (patch) => onChange({ ...question, ...patch });

  // Geriye dönük uyum: eski 'images' ve 'numberLine' alanlarını shapes'e çevir
  const shapes = useMemo(() => {
    if (question.shapes && question.shapes.length > 0) return question.shapes;
    // Migration: eski formattan yeni formata
    const out = [];
    if (question.numberLine) {
      out.push({ id: uniqueId(), type: 'numberLine', data: question.numberLine, layout: 'below' });
    }
    if (question.images && question.images.length > 0) {
      question.images.forEach(img => {
        out.push({ id: uniqueId(), type: 'image', data: img, layout: 'below' });
      });
    }
    return out;
  }, [question.shapes, question.numberLine, question.images]);

  // Şekilleri güncelleyen helper (eski alanları da temizler)
  const updateShapes = (newShapes) => {
    onChange({ ...question, shapes: newShapes, numberLine: undefined, images: undefined });
  };

  // Yeni şekli yerleştirme akışı tetikle
  const requestAddShape = (shape) => {
    // İlk şekilse direk ekle, sonraki şekilse layout sor
    if (shapes.length === 0) {
      updateShapes([{ ...shape, id: uniqueId(), layout: 'below' }]);
    } else {
      setPendingShape(shape);
    }
  };

  const confirmAddShape = (layout) => {
    if (!pendingShape) return;
    updateShapes([...shapes, { ...pendingShape, id: uniqueId(), layout }]);
    setPendingShape(null);
  };

  const deleteShape = (shapeId) => {
    updateShapes(shapes.filter(s => s.id !== shapeId));
  };

  const moveShape = (shapeId, direction) => {
    const idx = shapes.findIndex(s => s.id === shapeId);
    if (idx === -1) return;
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= shapes.length) return;
    const newShapes = [...shapes];
    [newShapes[idx], newShapes[newIdx]] = [newShapes[newIdx], newShapes[idx]];
    updateShapes(newShapes);
  };

  const updateShapeLayout = (shapeId, layout) => {
    updateShapes(shapes.map(s => s.id === shapeId ? { ...s, layout } : s));
  };

  const updateShapeData = (shapeId, data) => {
    updateShapes(shapes.map(s => s.id === shapeId ? { ...s, data } : s));
  };

  const handleImageUpload = (e, itemId = null) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    // Hedefi ayarla (sayı doğrusu/görsel sonuçları buraya gidecek)
    setShapeTarget(itemId ? { itemId } : null);

    if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
      setPdfFile(file);
      return;
    }

    const reader = new FileReader();
    reader.onload = (ev) => setCropSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  const insertLatex = (latex) => {
    if (shapeTarget?.itemId) {
      // Maddenin metnine ekle
      const it = (question.items || []).find(x => x.id === shapeTarget.itemId);
      if (it) {
        update({ items: (question.items || []).map(x => x.id === shapeTarget.itemId ? { ...x, text: (x.text || '') + ' ' + latex } : x) });
      }
    } else {
      update({ text: (question.text || '') + ' ' + latex });
    }
  };

  // Bir şekli (sayı doğrusu/görsel) hedef maddeye ekle
  const addShapeToItem = (itemId, shape) => {
    const it = (question.items || []).find(x => x.id === itemId);
    if (!it) return;
    const itShapes = it.shapes || [];
    update({ items: (question.items || []).map(x => x.id === itemId ? { ...x, shapes: [...itShapes, { ...shape, id: uniqueId(), layout: 'below' }] } : x) });
  };

  const setOptionCount = (count) => {
    const current = question.options || [];
    const newOpts = [];
    for (let i = 0; i < count; i++) {
      newOpts.push(current[i] !== undefined ? normOption(current[i]) : { text: '', shapes: [] });
    }
    update({ options: newOpts });
  };

  // Alt madde yönetimi
  const items = question.items || [];
  const addItem = () => {
    // Otomatik etiket önerisi: a) b) c) ...
    const nextLetter = String.fromCharCode(97 + items.length); // a, b, c...
    update({
      items: [...items, {
        id: uniqueId(),
        label: `${nextLetter})`,
        text: '',
        points: '',
        hasPoints: false,
        hasAnswer: true,
        answerHeight: 25,
        background: 'none'
      }]
    });
  };
  const updateItem = (id, patch) => {
    update({ items: items.map(it => it.id === id ? { ...it, ...patch } : it) });
  };
  const deleteItem = (id) => {
    update({ items: items.filter(it => it.id !== id) });
  };
  const moveItem = (idx, dir) => {
    const to = idx + dir;
    if (to < 0 || to >= items.length) return;
    const arr = [...items];
    const [m] = arr.splice(idx, 1);
    arr.splice(to, 0, m);
    update({ items: arr });
  };

  return (
    <div
      className={`border-2 rounded-lg p-4 bg-white mb-3 print:hidden transition-all ${
        isDragOver ? 'border-blue-500 border-dashed bg-blue-50' : 'border-slate-200'
      } ${isDragging ? 'opacity-40' : ''}`}
      {...(dragHandlers?.dropZone || {})}
    >
      <div className="flex justify-between items-center mb-3">
        <div className="flex items-center gap-2">
          {/* Sürükleme tutamacı */}
          <div
            {...(dragHandlers?.dragHandle || {})}
            className="cursor-grab active:cursor-grabbing text-slate-400 hover:text-slate-700 p-1 -ml-1 touch-none"
            title="Sürükleyerek taşı"
          >
            <GripVertical className="w-5 h-5" />
          </div>
          <span className="bg-slate-800 text-white rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold">{index + 1}</span>
          <span className="text-sm text-slate-600">Soru</span>
        </div>
        <div className="flex items-center gap-1">
          {/* Ok butonları (sürükleme olmazsa diye) */}
          <button
            onClick={onMoveUp}
            disabled={!canMoveUp}
            className="p-1 text-slate-400 hover:text-slate-700 disabled:opacity-30 disabled:cursor-not-allowed"
            title="Yukarı taşı"
          >
            <ChevronUp className="w-5 h-5" />
          </button>
          <button
            onClick={onMoveDown}
            disabled={!canMoveDown}
            className="p-1 text-slate-400 hover:text-slate-700 disabled:opacity-30 disabled:cursor-not-allowed"
            title="Aşağı taşı"
          >
            <ChevronDown className="w-5 h-5" />
          </button>
          <button onClick={onDelete} className="text-red-500 hover:text-red-700 p-1">
            <Trash2 className="w-4 h-4" />
          </button>
        </div>
      </div>

      {/* Üst kontroller: puan, kazanım, tip, layout */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
        <div>
          <div className="h-5 flex items-center justify-between">
            <span className="text-xs text-slate-600">Puan</span>
            <label className="flex items-center gap-1 cursor-pointer" title="Yazılı kağıdında puanı göster/gizle">
              <input
                type="checkbox"
                checked={question.showPoints !== false}
                onChange={(e) => update({ showPoints: e.target.checked })}
              />
              <span className="text-xs text-slate-500">göster</span>
            </label>
          </div>
          <NumericInput value={question.points} onChange={(v) => update({ points: v })} integer
            disabled={question.showPoints === false}
            className={`w-full border border-slate-300 rounded px-2 py-1 ${question.showPoints === false ? 'bg-slate-100 text-slate-400' : ''}`} />
        </div>
        <div>
          <div className="h-5 flex items-center"><span className="text-xs text-slate-600">Soru tipi</span></div>
          <select value={question.type} onChange={(e) => update({ type: e.target.value })}
            className="w-full border border-slate-300 rounded px-2 py-1">
            <option value="open">Açık uçlu</option>
            <option value="multiple">Çoktan seçmeli</option>
            <option value="fill">Boşluk doldurma</option>
            <option value="tf">Doğru/Yanlış</option>
          </select>
        </div>
        <div>
          <div className="h-5 flex items-center"><span className="text-xs text-slate-600">Zemin</span></div>
          <select value={question.background || 'none'} onChange={(e) => update({ background: e.target.value })}
            className="w-full border border-slate-300 rounded px-2 py-1">
            <option value="none">Düz (boş)</option>
            <option value="grid">Kareli</option>
            <option value="dotted">Noktalı</option>
            <option value="lined">Çizgili</option>
          </select>
        </div>
        <div>
          <div className="h-5 flex items-center"><span className="text-xs text-slate-600">Çözüm alanı yüksekliği</span></div>
          <div className="relative">
            <NumericInput value={question.answerHeight ?? 40} onChange={(v) => update({ answerHeight: v })} integer
              className="w-full border border-slate-300 rounded px-2 py-1 pr-9" />
            <span className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none select-none">mm</span>
          </div>
        </div>
      </div>

      {/* Kazanım */}
      <div className="mb-3">
        <label className="text-xs text-slate-600 flex items-center gap-2">
          <input type="checkbox" checked={!!question.showLearning} onChange={(e) => update({ showLearning: e.target.checked })} />
          Kazanım göster
        </label>
        {question.showLearning && (
          <input type="text" value={question.learning || ''} onChange={(e) => update({ learning: e.target.value })}
            placeholder="Kazanım yazın..." className="w-full border border-slate-300 rounded px-2 py-1 mt-1 text-sm" />
        )}
      </div>

      {/* Sonraki soruya bağlantı */}
      {index < totalQuestions - 1 && (
        <div className="grid grid-cols-2 gap-2 mb-3 p-2 bg-slate-50 border border-slate-200 rounded">
          <div>
            <label className="text-xs text-slate-600">Bir sonraki soru ile düzen</label>
            <select value={question.nextLayout || 'below'} onChange={(e) => update({ nextLayout: e.target.value })}
              className="w-full border border-slate-300 rounded px-2 py-1">
              <option value="below">Alt alta</option>
              <option value="side">Yan yana</option>
            </select>
          </div>
          {question.nextLayout !== 'side' && (
            <div>
              <label className="text-xs text-slate-600">Sonraki soru ile aradaki boşluk</label>
              <div className="relative">
                <NumericInput value={question.gapMm ?? 5} onChange={(v) => update({ gapMm: v })} integer
                  className="w-full border border-slate-300 rounded px-2 py-1 pr-9" />
                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none select-none">mm</span>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Soru metni - font kontrolleri */}
      <div className="mb-2">
        <label className="text-xs text-slate-600">Soru metni - yazı stili</label>
        <TextStyleControls style={question.textStyle} onChange={(s) => update({ textStyle: s })} compact />
      </div>

      {/* Soru metni */}
      <textarea
        value={question.text || ''}
        onChange={(e) => update({ text: e.target.value })}
        placeholder="Soruyu yazın... ($..$ arasına LaTeX yazabilirsiniz)"
        className="w-full border border-slate-300 rounded p-2 min-h-[80px] mb-2"
        style={styleToCSS(question.textStyle)}
      />

      {/* Ek araçlar */}
      <div className="grid grid-cols-2 gap-2 mb-3">
        <label className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5 cursor-pointer">
          <ImageIcon className="w-3.5 h-3.5 shrink-0" /> Görsel / PDF ekle
          <input
            type="file"
            accept="image/*,application/pdf"
            onChange={handleImageUpload}
            style={{ position: 'absolute', width: 1, height: 1, opacity: 0, pointerEvents: 'none' }}
          />
        </label>
        <button onClick={() => setShowLatex(true)} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          <Sigma className="w-3.5 h-3.5 shrink-0" /> LaTeX
        </button>
        <button onClick={() => setShowNumberLine(true)} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          <Minus className="w-3.5 h-3.5 shrink-0" /> Sayı doğrusu
        </button>
        <button onClick={() => setChartEditor({ chartType: 'frequencyTable' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          📋 Sıklık Tablosu
        </button>
        <button onClick={() => setChartEditor({ chartType: 'tallyTable' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          ✏️ Çetele Tablosu
        </button>
        <button onClick={() => setChartEditor({ chartType: 'barChart' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          📊 Sütun Grafiği
        </button>
        <button onClick={() => setChartEditor({ chartType: 'pieChart' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          🥧 Daire Grafiği
        </button>
        <button onClick={() => setChartEditor({ chartType: 'lineChart' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          📈 Çizgi Grafiği
        </button>
        <button onClick={() => setChartEditor({ chartType: 'dotChart' })} className="text-xs px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1.5">
          ⠿ Nokta Grafiği
        </button>
      </div>

      {/* Alt maddeler */}
      <div className="mb-3 border border-slate-200 rounded p-2 bg-slate-50">
        <div className="flex justify-between items-center mb-2">
          <span className="text-xs font-semibold text-slate-700">Alt maddeler {items.length > 0 && `(${items.length})`}</span>
          <button onClick={addItem} className="text-xs px-2 py-1 bg-slate-700 text-white rounded hover:bg-slate-800 flex items-center gap-1">
            <Plus className="w-3 h-3" /> Madde ekle
          </button>
        </div>
        {items.length === 0 && (
          <div className="text-xs text-slate-400">Bir soruyu madde madde sormak için "Madde ekle"ye basın (örn. a, b, c şıkları).</div>
        )}
        {items.map((it, i) => (
          <div key={it.id} className="border border-slate-200 rounded p-2 mb-2 bg-white">
            <div className="flex items-center gap-1 mb-1">
              <input
                type="text"
                value={it.label}
                onChange={(e) => updateItem(it.id, { label: e.target.value })}
                className="w-16 border border-slate-300 rounded px-1 py-0.5 text-sm font-bold text-center"
                placeholder="a)"
                title="Madde etiketi"
              />
              <span className="text-xs text-slate-400 flex-1">madde {i + 1}</span>
              <button onClick={() => moveItem(i, -1)} disabled={i === 0}
                className="p-0.5 text-slate-400 hover:text-slate-700 disabled:opacity-30" title="Yukarı">
                <ChevronUp className="w-4 h-4" />
              </button>
              <button onClick={() => moveItem(i, 1)} disabled={i === items.length - 1}
                className="p-0.5 text-slate-400 hover:text-slate-700 disabled:opacity-30" title="Aşağı">
                <ChevronDown className="w-4 h-4" />
              </button>
              <button onClick={() => deleteItem(it.id)} className="p-0.5 text-red-500 hover:text-red-700" title="Sil">
                <Trash2 className="w-3.5 h-3.5" />
              </button>
            </div>
            <textarea
              value={it.text}
              onChange={(e) => updateItem(it.id, { text: e.target.value })}
              placeholder="Madde metni... ($..$ arası LaTeX yazılabilir)"
              className="w-full border border-slate-300 rounded p-2 min-h-[50px] text-sm mb-1"
            />
            <div className="flex flex-wrap gap-3 items-center text-xs">
              {/* Puan */}
              <label className="flex items-center gap-1">
                <input type="checkbox" checked={!!it.hasPoints}
                  onChange={(e) => updateItem(it.id, { hasPoints: e.target.checked })} />
                Puan:
              </label>
              {it.hasPoints && (
                <NumericInput value={it.points === '' ? 0 : it.points} onChange={(v) => updateItem(it.id, { points: v })} integer
                  className="w-16 border border-slate-300 rounded px-1 py-0.5" />
              )}
              {/* Çözüm alanı */}
              <label className="flex items-center gap-1">
                <input type="checkbox" checked={!!it.hasAnswer}
                  onChange={(e) => updateItem(it.id, { hasAnswer: e.target.checked })} />
                Çözüm alanı
              </label>
              {it.hasAnswer && (
                <>
                  <div className="relative">
                    <NumericInput value={it.answerHeight ?? 25} onChange={(v) => updateItem(it.id, { answerHeight: v })} integer
                      className="w-16 border border-slate-300 rounded px-1 py-0.5 pr-7" />
                    <span className="absolute right-1 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none">mm</span>
                  </div>
                  <select value={it.background || 'none'} onChange={(e) => updateItem(it.id, { background: e.target.value })}
                    className="border border-slate-300 rounded px-1 py-0.5">
                    <option value="none">Düz</option>
                    <option value="grid">Kareli</option>
                    <option value="dotted">Noktalı</option>
                    <option value="lined">Çizgili</option>
                  </select>
                </>
              )}
            </div>
            {/* Maddeye ek araçlar */}
            <div className="mt-2 pt-2 border-t border-slate-100 space-y-1">
              <div className="flex flex-wrap gap-1 items-center">
                <button onClick={() => { setShapeTarget({ itemId: it.id }); setShowLatex(true); }}
                  className="text-[11px] px-1.5 py-0.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1">
                  <Sigma className="w-3 h-3" /> LaTeX
                </button>
                <button onClick={() => { setShapeTarget({ itemId: it.id }); setEditingShapeId(null); setShowNumberLine(true); }}
                  className="text-[11px] px-1.5 py-0.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1">
                  <Minus className="w-3 h-3" /> Sayı doğrusu
                </button>
                <label className="text-[11px] px-1.5 py-0.5 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1 cursor-pointer">
                  <ImageIcon className="w-3 h-3" /> Görsel/PDF
                  <input type="file" accept="image/*,application/pdf"
                    onChange={(e) => handleImageUpload(e, it.id)}
                    style={{ position: 'absolute', width: 1, height: 1, opacity: 0, pointerEvents: 'none' }} />
                </label>
              </div>
              <div className="flex flex-wrap gap-1 items-center">
                <span className="text-[11px] text-slate-500 mr-1">Grafik/Tablo:</span>
                {Object.entries(CHART_TYPE_LABELS).map(([ct, lbl]) => (
                  <button key={ct}
                    onClick={() => setChartEditor({ chartType: ct, itemId: it.id })}
                    className="text-[11px] px-1.5 py-0.5 border border-slate-300 rounded hover:bg-slate-100">
                    {lbl}
                  </button>
                ))}
              </div>
              {/* Maddedeki şekiller */}
              {(it.shapes || []).length > 0 && (
                <div className="mt-2 flex flex-wrap gap-2">
                  {it.shapes.map((sh) => (
                    <div key={sh.id} className="relative border border-slate-200 rounded p-1 bg-white" style={{ width: 160 }}>
                      {sh.type === 'numberLine' ? <NumberLineDisplay data={sh.data} />
                        : sh.type === 'image' ? <img src={sh.data} alt="" className="max-h-16 mx-auto" />
                        : <ChartDisplay data={sh.data} />}
                      <div className="flex justify-center gap-2 mt-1">
                        {CHART_TYPE_LABELS[sh.type] && (
                          <button onClick={() => setChartEditor({ chartType: sh.type, itemId: it.id, editingId: sh.id })}
                            className="text-[10px] text-blue-600 hover:underline">Düzenle</button>
                        )}
                        <button onClick={() => updateItem(it.id, { shapes: it.shapes.filter(x => x.id !== sh.id) })}
                          className="text-[10px] text-red-500 hover:underline">Sil</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Eklenmiş şekiller (sayı doğruları + görseller) */}
      {shapes.length > 0 && (
        <div className="mb-3">
          <div className="text-xs text-slate-600 mb-1">Eklenmiş şekiller ({shapes.length}):</div>
          <div className="space-y-2">
            {shapes.map((shape, i) => (
              <div key={shape.id} className="border border-slate-200 rounded p-2 bg-slate-50">
                <div className="flex items-center justify-between gap-2 mb-1">
                  <div className="flex items-center gap-2 text-xs">
                    <span className="bg-slate-700 text-white rounded px-1.5 py-0.5 text-xs font-mono">{i + 1}</span>
                    <span className="text-slate-600">
                      {shape.type === 'numberLine' ? 'Sayı doğrusu'
                        : shape.type === 'image' ? 'Görsel'
                        : (CHART_TYPE_LABELS[shape.type] || 'Şekil')}
                    </span>
                    {i > 0 && (
                      <select
                        value={shape.layout || 'below'}
                        onChange={(e) => updateShapeLayout(shape.id, e.target.value)}
                        className="border border-slate-300 rounded px-1 py-0.5 text-xs bg-white"
                      >
                        <option value="below">⬇ Alta</option>
                        <option value="side">➡ Yana</option>
                      </select>
                    )}
                  </div>
                  <div className="flex items-center gap-1">
                    <button
                      onClick={() => moveShape(shape.id, -1)}
                      disabled={i === 0}
                      className="text-slate-500 hover:text-slate-800 disabled:opacity-30 px-1"
                      title="Yukarı"
                    >↑</button>
                    <button
                      onClick={() => moveShape(shape.id, +1)}
                      disabled={i === shapes.length - 1}
                      className="text-slate-500 hover:text-slate-800 disabled:opacity-30 px-1"
                      title="Aşağı"
                    >↓</button>
                    {shape.type === 'numberLine' && (
                      <button
                        onClick={() => { setEditingShapeId(shape.id); setShowNumberLine(true); }}
                        className="text-xs text-blue-600 hover:underline px-1"
                      >Düzenle</button>
                    )}
                    {CHART_TYPE_LABELS[shape.type] && (
                      <button
                        onClick={() => setChartEditor({ editingId: shape.id, chartType: shape.type })}
                        className="text-xs text-blue-600 hover:underline px-1"
                      >Düzenle</button>
                    )}
                    <button
                      onClick={() => deleteShape(shape.id)}
                      className="text-red-500 hover:text-red-700 px-1"
                      title="Sil"
                    >×</button>
                  </div>
                </div>
                <div className="flex justify-center bg-white rounded p-1">
                  {shape.type === 'numberLine' ? (
                    <NumberLineDisplay data={shape.data} />
                  ) : shape.type === 'image' ? (
                    <img src={shape.data} alt="" className="max-h-24 max-w-full" />
                  ) : (
                    <div className="w-full max-w-[200px]"><ChartDisplay data={shape.data} /></div>
                  )}
                </div>
              </div>
            ))}
          </div>
          <div className="mt-2">
            <label className="text-xs text-slate-600">Şekillerin soru metnine göre konumu:</label>
            <select value={question.shapesPos || 'above'} onChange={(e) => update({ shapesPos: e.target.value })}
              className="border border-slate-300 rounded px-2 py-0.5 text-xs ml-2">
              <option value="above">Soru metninin üstünde</option>
              <option value="below">Soru metninin altında</option>
            </select>
          </div>
        </div>
      )}

      {/* Tip-specific alanlar */}
      {question.type === 'multiple' && (
        <div className="border-t border-slate-200 pt-3">
          <div className="flex items-center gap-2 mb-2">
            <label className="text-xs text-slate-600">Seçenek sayısı:</label>
            <select value={(question.options || []).length || 4} onChange={(e) => setOptionCount(parseInt(e.target.value))}
              className="border border-slate-300 rounded px-2 py-0.5 text-sm">
              {[2,3,4,5,6].map(n => <option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div className="space-y-1">
            {(question.options || []).map((optRaw, i) => {
              const opt = normOption(optRaw);
              return (
                <div key={i} className="flex items-center gap-2">
                  <span className="font-bold w-6">{String.fromCharCode(65 + i)})</span>
                  <input
                    type="text"
                    value={opt.text}
                    onChange={(e) => {
                      const newOpts = (question.options || []).map((o, j) => j === i ? { ...normOption(o), text: e.target.value } : o);
                      update({ options: newOpts });
                    }}
                    className="flex-1 border border-slate-300 rounded px-2 py-1 text-sm"
                    placeholder={`Seçenek ${String.fromCharCode(65 + i)}`}
                  />
                </div>
              );
            })}
          </div>
        </div>
      )}

      {question.type === 'tf' && (
        <div className="border-t border-slate-200 pt-3 text-sm text-slate-600">
          Doğru/Yanlış seçenekleri yazılı kağıdında otomatik gösterilecek (D / Y).
        </div>
      )}

      {question.type === 'fill' && (
        <div className="border-t border-slate-200 pt-3 text-sm text-slate-600">
          Boşluk doldurma sorusu. Soru metninde boşluk göstermek için <code className="bg-slate-100 px-1">_____</code> kullanın.
        </div>
      )}

      {showLatex && <LatexEditor onInsert={insertLatex} onClose={() => { setShowLatex(false); setShapeTarget(null); }} />}
      {showNumberLine && (
        <NumberLineEditor
          initial={editingShapeId ? shapes.find(s => s.id === editingShapeId)?.data : null}
          onSave={(data) => {
            if (editingShapeId) {
              // Mevcut sayı doğrusunu güncelle
              updateShapeData(editingShapeId, data);
            } else if (shapeTarget?.itemId) {
              // Maddeye ekle
              addShapeToItem(shapeTarget.itemId, { type: 'numberLine', data });
            } else {
              // Yeni sayı doğrusu ekle (yerleşim sorulacak)
              requestAddShape({ type: 'numberLine', data });
            }
          }}
          onClose={() => { setShowNumberLine(false); setEditingShapeId(null); setShapeTarget(null); }}
        />
      )}
      {cropSrc && (
        <ImageCropper
          src={cropSrc}
          onCrop={(dataUrl) => {
            if (shapeTarget?.itemId) {
              addShapeToItem(shapeTarget.itemId, { type: 'image', data: dataUrl });
            } else {
              requestAddShape({ type: 'image', data: dataUrl });
            }
          }}
          onClose={() => { setCropSrc(null); setShapeTarget(null); }}
        />
      )}
      {pdfFile && (
        <PdfPagePicker
          file={pdfFile}
          onPageSelected={(dataUrl) => setCropSrc(dataUrl)}
          onClose={() => setPdfFile(null)}
        />
      )}
      {pendingShape && (
        <ShapeLayoutPicker
          onPick={confirmAddShape}
          onCancel={() => setPendingShape(null)}
        />
      )}
      {chartEditor && (
        <ChartEditor
          chartType={chartEditor.chartType}
          initial={
            chartEditor.itemId
              ? ((items.find(it => it.id === chartEditor.itemId)?.shapes || []).find(s => s.id === chartEditor.editingId)?.data ?? null)
              : (chartEditor.editingId ? shapes.find(s => s.id === chartEditor.editingId)?.data : null)
          }
          onSave={(data) => {
            if (chartEditor.itemId) {
              // Maddeye ekle veya maddedeki şekli güncelle
              const it = items.find(x => x.id === chartEditor.itemId);
              const itShapes = it?.shapes || [];
              if (chartEditor.editingId) {
                updateItem(chartEditor.itemId, { shapes: itShapes.map(s => s.id === chartEditor.editingId ? { ...s, data } : s) });
              } else {
                updateItem(chartEditor.itemId, { shapes: [...itShapes, { id: uniqueId(), type: data.chartType, data, layout: 'below' }] });
              }
            } else if (chartEditor.editingId) {
              updateShapeData(chartEditor.editingId, data);
            } else {
              requestAddShape({ type: data.chartType, data });
            }
          }}
          onClose={() => setChartEditor(null)}
        />
      )}
    </div>
  );
};

// QuestionEditor memo ile sarılı — sadece prop'u değişen sorular re-render olur
const QuestionEditor = React.memo(QuestionEditorImpl);

// Her soru için callback'leri stabil tutan wrapper.
// Parent'tan questionId + global updateQuestion/deleteQuestion/moveQuestion + index alır,
// içinde useCallback ile stabil callback'ler oluşturur. Böylece question değişmediyse
// QuestionEditor re-render olmaz.
const QuestionEditorRowImpl = ({ question, index, totalQuestions, updateQuestion, deleteQuestion, moveQuestion, makeDragHandlers, isDragging, isDragOver }) => {
  const qId = question.id;
  const onChange = useCallback((nq) => updateQuestion(qId, nq), [qId, updateQuestion]);
  const onDelete = useCallback(() => deleteQuestion(qId), [qId, deleteQuestion]);
  const onMoveUp = useCallback(() => moveQuestion(index, index - 1), [index, moveQuestion]);
  const onMoveDown = useCallback(() => moveQuestion(index, index + 1), [index, moveQuestion]);
  const dragHandlers = useMemo(() => makeDragHandlers(qId), [qId, makeDragHandlers]);
  return (
    <QuestionEditor
      question={question}
      index={index}
      totalQuestions={totalQuestions}
      onChange={onChange}
      onDelete={onDelete}
      onMoveUp={onMoveUp}
      onMoveDown={onMoveDown}
      canMoveUp={index > 0}
      canMoveDown={index < totalQuestions - 1}
      dragHandlers={dragHandlers}
      isDragging={isDragging}
      isDragOver={isDragOver}
    />
  );
};

const QuestionEditorRow = React.memo(QuestionEditorRowImpl);

// ============== YAZILI KAĞIDI ÇIKTI BILEŞENI ==============

const QuestionDisplayImpl = ({ question, index, halfWidth = false }) => {
  // KaTeX yüklendiğinde re-render için (içerikte $...$ varsa otomatik düzgün gösterilsin)
  useKatex();

  const bgStyle = (() => {
    switch (question.background) {
      case 'grid':
        return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '5mm 5mm' };
      case 'dotted':
        return { backgroundImage: 'radial-gradient(#94a3b8 0.5px, transparent 0.5px)', backgroundSize: '5mm 5mm' };
      case 'lined':
        return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '100% 7mm' };
      default:
        return {};
    }
  })();

  // Şekilleri al (geriye dönük uyum: eski numberLine ve images da dahil)
  const shapes = (() => {
    if (question.shapes && question.shapes.length > 0) return question.shapes;
    const out = [];
    if (question.numberLine) {
      out.push({ id: 'legacy-nl', type: 'numberLine', data: question.numberLine, layout: 'below' });
    }
    if (question.images && question.images.length > 0) {
      question.images.forEach((img, i) => {
        out.push({ id: `legacy-img-${i}`, type: 'image', data: img, layout: 'below' });
      });
    }
    return out;
  })();

  // Şekilleri satırlara grupla: 'below' olan yeni satır başlatır, 'side' aynı satırda devam eder
  const shapeRows = (() => {
    const rows = [];
    shapes.forEach((shape, i) => {
      if (i === 0 || shape.layout !== 'side') {
        rows.push([shape]);
      } else {
        rows[rows.length - 1].push(shape);
      }
    });
    return rows;
  })();

  // Tek bir şekli render et — kapsayıcı genişliğine sığar
  const renderShape = (shape) => {
    if (shape.type === 'numberLine') {
      return <NumberLineDisplay data={shape.data} />;
    }
    if (shape.type === 'image') {
      return (
        <img
          src={shape.data}
          alt=""
          style={{ maxWidth: '100%', maxHeight: '60mm', height: 'auto', display: 'block', margin: '0 auto' }}
        />
      );
    }
    // Tablo/grafik türleri
    if (CHART_TYPE_LABELS[shape.type]) {
      return <ChartDisplay data={shape.data} />;
    }
    return null;
  };

  // Şekiller bloğu (üst/alt yerleşim için tekrar kullanılacak)
  const renderShapesBlock = () => {
    if (shapes.length === 0) return null;
    return (
      <div className="my-2">
        {shapeRows.map((row, ri) => (
          <div
            key={ri}
            className={row.length > 1 ? 'grid gap-3 mb-2' : 'mb-2'}
            style={row.length > 1 ? { gridTemplateColumns: `repeat(${row.length}, minmax(0, 1fr))` } : {}}
          >
            {row.map(shape => (
              <div key={shape.id} className="flex items-center justify-center min-w-0">
                {renderShape(shape)}
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  };

  // Şekillerin pozisyonu (varsayılan: üstte). Eski numberLinePos ile uyumlu olalım.
  const shapesPos = question.shapesPos || question.numberLinePos || 'above';

  return (
    <div className="question-block" data-question-id={question.id} style={{ marginBottom: `${question.gapMm ?? 5}mm` }}>
      {question.showLearning && question.learning && (
        <div className="text-xs italic text-slate-600 mb-1">Kazanım: {question.learning}</div>
      )}
      <div className="flex items-start gap-2 mb-1">
        <span className="font-bold whitespace-nowrap" style={styleToCSS(question.textStyle)}>
          {index + 1}){question.showPoints !== false && <span className="text-sm"> ({question.points} puan)</span>}
        </span>
      </div>

      {shapesPos === 'above' && renderShapesBlock()}

      <div style={styleToCSS(question.textStyle)} className="question-text mb-2"
           dangerouslySetInnerHTML={{ __html: renderQuestionText(question.text) }} />

      {shapesPos === 'below' && renderShapesBlock()}

      {/* Alt maddeler */}
      {(question.items || []).length > 0 && (
        <div className="mt-2 space-y-2">
          {question.items.map((it) => {
            const itemBg = (() => {
              switch (it.background) {
                case 'grid':
                  return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px), linear-gradient(90deg, #cbd5e1 1px, transparent 1px)', backgroundSize: '5mm 5mm' };
                case 'dotted':
                  return { backgroundImage: 'radial-gradient(#94a3b8 0.5px, transparent 0.5px)', backgroundSize: '5mm 5mm' };
                case 'lined':
                  return { backgroundImage: 'linear-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '100% 7mm' };
                default:
                  return {};
              }
            })();
            return (
              <div key={it.id}>
                <div style={styleToCSS(question.textStyle)} className="flex items-start gap-1">
                  <span className="font-bold whitespace-nowrap">{it.label}</span>
                  <span className="flex-1">
                    <span dangerouslySetInnerHTML={{ __html: renderQuestionText(it.text) }} />
                    {it.hasPoints && it.points !== '' && (
                      <span className="text-sm"> ({it.points} puan)</span>
                    )}
                  </span>
                </div>
                {/* Maddedeki grafikler */}
                {(it.shapes || []).length > 0 && (
                  <div className="my-1 flex flex-wrap gap-3 justify-center">
                    {it.shapes.map((sh) => (
                      <div key={sh.id} style={{ maxWidth: 280, flex: '1 1 200px' }}>
                        {sh.type === 'numberLine' ? <NumberLineDisplay data={sh.data} />
                          : sh.type === 'image' ? <img src={sh.data} alt="" style={{ maxWidth: '100%', maxHeight: '60mm' }} />
                          : <ChartDisplay data={sh.data} />}
                      </div>
                    ))}
                  </div>
                )}
                {it.hasAnswer && (it.answerHeight ?? 25) > 0 && (
                  <div
                    className="mt-1 border border-slate-400"
                    style={{ height: `${it.answerHeight ?? 25}mm`, marginRight: '2mm', ...itemBg }}
                  />
                )}
              </div>
            );
          })}
        </div>
      )}

      {question.type === 'multiple' && (
        <div className={`grid ${halfWidth ? 'grid-cols-1' : 'grid-cols-2'} gap-x-4 gap-y-1 mt-2`}>
          {(question.options || []).map((optRaw, i) => {
            const opt = normOption(optRaw);
            return (
              <div key={i} style={styleToCSS(question.textStyle)}>
                <span className="font-bold">{String.fromCharCode(65 + i)})</span> <span dangerouslySetInnerHTML={{ __html: renderQuestionText(opt.text) }} />
              </div>
            );
          })}
        </div>
      )}

      {question.type === 'tf' && (
        <div className="flex gap-6 mt-2" style={styleToCSS(question.textStyle)}>
          <div>(   ) Doğru</div>
          <div>(   ) Yanlış</div>
        </div>
      )}

      {question.type === 'open' && (question.items || []).length === 0 && (question.answerHeight ?? 40) > 0 && (
        <div
          className="mt-1 border border-slate-400"
          style={{
            height: `${question.answerHeight ?? 40}mm`,
            marginRight: '2mm',
            ...bgStyle
          }}
        />
      )}

      {(question.type === 'multiple' || question.type === 'tf' || question.type === 'fill') && question.background !== 'none' && (question.answerHeight ?? 20) > 0 && (
        <div
          className="mt-2 border border-slate-400"
          style={{
            height: `${question.answerHeight ?? 20}mm`,
            marginRight: '2mm',
            ...bgStyle
          }}
        />
      )}
    </div>
  );
};

function YaziliApp() {
  const [meta, setMeta] = useState({
    schoolName: '',
    academicYear: '2025-2026',
    subject: '',
    grade: '',
    term: 'II',
    examNumber: 'I',
    endNote: ''
  });

  const [headerStyle, setHeaderStyle] = useState(defaultStyle(14));
  const [endNoteStyle, setEndNoteStyle] = useState(defaultStyle(11));

  const [questions, setQuestions] = useState([]);
  const [view, setView] = useState('edit'); // edit | preview
  const [dragState, setDragState] = useState({ draggedId: null, overId: null });
  const [showSavePanel, setShowSavePanel] = useState(false); // Yazılılarım paneli
  const [saveName, setSaveName] = useState(''); // Kaydetme için isim
  const [savedList, setSavedList] = useState([]); // localStorage'daki yazılılar
  const printRef = useRef(null);

  const STORAGE_KEY = 'mb-yazili-kayitlar';

  // localStorage erişimi güvenli (artifact'te çalışmayabilir)
  const safeStorage = {
    get: () => {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) { return null; }
    },
    set: (obj) => {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
        return true;
      } catch (e) { return false; }
    }
  };

  // Kayıtlı yazılı listesini yenile
  const refreshSavedList = React.useCallback(() => {
    const all = safeStorage.get();
    if (all === null) { setSavedList(null); return; } // null = localStorage yok
    const list = Object.entries(all).map(([name, data]) => ({
      name,
      savedAt: data._savedAt || 0,
      questionCount: (data.questions || []).length
    })).sort((a, b) => b.savedAt - a.savedAt);
    setSavedList(list);
  }, []);

  // Panel açılınca listeyi yükle
  useEffect(() => {
    if (showSavePanel) refreshSavedList();
  }, [showSavePanel, refreshSavedList]);

  // Mevcut durumu bir nesne olarak topla
  const collectState = () => ({
    meta, headerStyle, endNoteStyle, questions,
    _savedAt: Date.now(),
    _version: 1
  });

  // Bir durumu uygula (yükleme)
  const applyState = (data) => {
    if (!data) return;
    if (data.meta) setMeta(data.meta);
    if (data.headerStyle) setHeaderStyle(data.headerStyle);
    if (data.endNoteStyle) setEndNoteStyle(data.endNoteStyle);
    if (Array.isArray(data.questions)) setQuestions(data.questions);
    setView('edit');
  };

  // localStorage'a kaydet
  const saveToStorage = (name) => {
    const trimmed = (name || '').trim();
    if (!trimmed) { alert('Lütfen yazılıya bir isim verin.'); return; }
    const all = safeStorage.get();
    if (all === null) {
      alert('Bu ortamda tarayıcı kaydı kullanılamıyor. Bunun yerine "JSON indir" ile dosyaya kaydedebilirsiniz.');
      return;
    }
    if (all[trimmed] && !window.confirm(`"${trimmed}" zaten var. Üzerine yazılsın mı?`)) return;
    all[trimmed] = collectState();
    if (safeStorage.set(all)) {
      setSaveName('');
      refreshSavedList();
      alert(`"${trimmed}" kaydedildi.`);
    } else {
      alert('Kaydedilemedi (tarayıcı hafızası dolu olabilir).');
    }
  };

  // localStorage'dan yükle
  const loadFromStorage = (name) => {
    const all = safeStorage.get();
    if (!all || !all[name]) return;
    if (questions.length > 0 && !window.confirm('Mevcut yazılının üzerine yüklensin mi? Kaydedilmemiş değişiklikler kaybolur.')) return;
    applyState(all[name]);
    setShowSavePanel(false);
  };

  // localStorage'dan sil
  const deleteFromStorage = (name) => {
    if (!window.confirm(`"${name}" silinsin mi?`)) return;
    const all = safeStorage.get();
    if (!all) return;
    delete all[name];
    safeStorage.set(all);
    refreshSavedList();
  };

  // JSON dosyası olarak indir
  const exportJson = () => {
    const data = collectState();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = (meta.subject || 'yazili').replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ ]/g, '').trim() || 'yazili';
    a.href = url;
    a.download = `${fname}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // JSON dosyasından yükle
  const importJson = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      let data;
      try {
        data = JSON.parse(ev.target.result);
      } catch (err) {
        alert('Dosya okunamadı. Geçerli bir MB-Yazılı yedek dosyası değil.');
        return;
      }
      if (questions.length > 0 && !window.confirm('Mevcut yazılının üzerine yüklensin mi? Kaydedilmemiş değişiklikler kaybolur.')) return;
      // Önce paneli kapat, sonra state'i uygula — alert kullanma (render'ı bloklar, yavaşlatır)
      setShowSavePanel(false);
      applyState(data);
    };
    reader.readAsText(file);
  };

  const addQuestion = React.useCallback(() => {
    setQuestions(prev => [...prev, {
      id: uniqueId(),
      type: 'open',
      points: 10,
      text: '',
      textStyle: defaultStyle(12),
      background: 'none',
      answerHeight: 40,
      shapes: [], // [{ id, type: 'numberLine'|'image', data, layout: 'below'|'side' }]
      items: [], // alt maddeler: [{ id, label, text, points, hasPoints, hasAnswer, answerHeight, background }]
      options: ['', '', '', ''],
      nextLayout: 'below',
      gapMm: 5,
      showLearning: false,
      learning: ''
    }]);
  }, []);

  const updateQuestion = React.useCallback((id, q) => {
    setQuestions(prev => prev.map(x => x.id === id ? q : x));
  }, []);

  const deleteQuestion = React.useCallback((id) => {
    setQuestions(prev => prev.filter(x => x.id !== id));
  }, []);

  const moveQuestion = React.useCallback((fromIdx, toIdx) => {
    setQuestions(prev => {
      if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= prev.length || toIdx >= prev.length) return prev;
      const newQs = [...prev];
      const [moved] = newQs.splice(fromIdx, 1);
      newQs.splice(toIdx, 0, moved);
      return newQs;
    });
  }, []);

  // Touch sürükleme için ek state (mobil)
  const touchDragRef = useRef({ active: false, draggedId: null, startY: 0, lastY: 0 });
  // Auto-scroll animasyon ref'i
  const autoScrollRafRef = useRef(null);

  // Auto-scroll loop: parmak ekran kenarına yakınsa otomatik kaydır
  // Ayrıca her frame'de hangi sorunun üzerinde olduğumuzu güncelle (scroll sırasında bile)
  const startAutoScroll = useCallback(() => {
    const tick = () => {
      if (!touchDragRef.current.active) {
        autoScrollRafRef.current = null;
        return;
      }
      const y = touchDragRef.current.lastY;
      const x = touchDragRef.current.lastX || window.innerWidth / 2;
      const h = window.innerHeight;
      // Üst veya alt %20'lik bölgede mi?
      const edge = h * 0.20;
      let scrollBy = 0;
      if (y < edge) {
        const ratio = Math.min(1, (edge - y) / edge);
        scrollBy = -Math.max(6, Math.floor(ratio * 22));
      } else if (y > h - edge) {
        const ratio = Math.min(1, (y - (h - edge)) / edge);
        scrollBy = Math.max(6, Math.floor(ratio * 22));
      }
      if (scrollBy !== 0) {
        try { window.scrollBy(0, scrollBy); } catch(e) {}
        try {
          if (document.scrollingElement) {
            document.scrollingElement.scrollTop += scrollBy;
          }
        } catch(e) {}
        try { document.documentElement.scrollTop += scrollBy; } catch(e) {}
        try { document.body.scrollTop += scrollBy; } catch(e) {}
      }

      // Her tick'te hangi sorunun üzerindeyiz hesapla (scroll sırasında bile güncel kalsın)
      const allBlocks = document.querySelectorAll('[data-question-id]');
      let overId = null;
      for (const block of allBlocks) {
        const rect = block.getBoundingClientRect();
        if (y >= rect.top && y <= rect.bottom) {
          const id = parseInt(block.getAttribute('data-question-id'));
          if (id && id !== touchDragRef.current.draggedId) {
            overId = id;
          }
          break;
        }
      }
      if (overId !== dragStateRef.current.overId) {
        setDragState(s => ({ ...s, overId }));
      }

      autoScrollRafRef.current = requestAnimationFrame(tick);
    };
    if (!autoScrollRafRef.current) {
      autoScrollRafRef.current = requestAnimationFrame(tick);
    }
  }, []);

  const stopAutoScroll = useCallback(() => {
    if (autoScrollRafRef.current) {
      cancelAnimationFrame(autoScrollRafRef.current);
      autoScrollRafRef.current = null;
    }
  }, []);

  // Component unmount olursa RAF'i temizle
  useEffect(() => {
    return () => {
      if (autoScrollRafRef.current) cancelAnimationFrame(autoScrollRafRef.current);
    };
  }, []);

  // questions'a stable referans için (closure'larda en güncel değeri okumak için)
  const questionsRef = useRef(questions);
  useEffect(() => { questionsRef.current = questions; }, [questions]);
  // dragState'i ref'te de tut ki callback'ler en güncelini okusun
  const dragStateRef = useRef(dragState);
  useEffect(() => { dragStateRef.current = dragState; }, [dragState]);

  // Drag handlers oluşturucu — useCallback ile stabil, her sorunun handler'ı aynı kalır
  const makeDragHandlers = useCallback((questionId) => ({
    dragHandle: {
      draggable: true,
      onDragStart: (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(questionId));
        setDragState({ draggedId: questionId, overId: null });
      },
      onDragEnd: () => {
        setDragState({ draggedId: null, overId: null });
      },
      onTouchStart: (e) => {
        const y = e.touches[0].clientY;
        const x = e.touches[0].clientX;
        touchDragRef.current = { active: true, draggedId: questionId, startY: y, lastY: y, lastX: x };
        setDragState({ draggedId: questionId, overId: null });
        startAutoScroll();
      },
      onTouchMove: (e) => {
        if (!touchDragRef.current.active) return;
        e.preventDefault();
        const touch = e.touches[0];
        // Son pozisyonu kaydet (auto-scroll için)
        touchDragRef.current.lastY = touch.clientY;
        touchDragRef.current.lastX = touch.clientX;

        // Tüm soru kutularını bul ve Y aralıklarına göre eşle (elementFromPoint'tan daha sağlam)
        const allBlocks = document.querySelectorAll('[data-question-id]');
        let overId = null;
        for (const block of allBlocks) {
          const rect = block.getBoundingClientRect();
          // Parmak bu kutunun dikey aralığında mı?
          if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
            const id = parseInt(block.getAttribute('data-question-id'));
            if (id && id !== touchDragRef.current.draggedId) {
              overId = id;
            }
            break;
          }
        }
        if (overId !== dragStateRef.current.overId) {
          setDragState(s => ({ ...s, overId }));
        }
      },
      onTouchEnd: () => {
        const { draggedId } = touchDragRef.current;
        const overId = dragStateRef.current.overId;
        if (draggedId && overId && draggedId !== overId) {
          const qs = questionsRef.current;
          const fromIdx = qs.findIndex(q => q.id === draggedId);
          const toIdx = qs.findIndex(q => q.id === overId);
          if (fromIdx !== -1 && toIdx !== -1) moveQuestion(fromIdx, toIdx);
        }
        touchDragRef.current = { active: false, draggedId: null, startY: 0, lastY: 0, lastX: 0 };
        stopAutoScroll();
        setDragState({ draggedId: null, overId: null });
      },
      onTouchCancel: () => {
        touchDragRef.current = { active: false, draggedId: null, startY: 0, lastY: 0, lastX: 0 };
        stopAutoScroll();
        setDragState({ draggedId: null, overId: null });
      }
    },
    dropZone: {
      'data-question-id': questionId,
      onDragOver: (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const ds = dragStateRef.current;
        if (ds.draggedId && ds.draggedId !== questionId && ds.overId !== questionId) {
          setDragState(s => ({ ...s, overId: questionId }));
        }
      },
      onDragLeave: () => {
        if (dragStateRef.current.overId === questionId) {
          setDragState(s => ({ ...s, overId: null }));
        }
      },
      onDrop: (e) => {
        e.preventDefault();
        const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
        if (!draggedId || draggedId === questionId) {
          setDragState({ draggedId: null, overId: null });
          return;
        }
        const qs = questionsRef.current;
        const fromIdx = qs.findIndex(q => q.id === draggedId);
        const toIdx = qs.findIndex(q => q.id === questionId);
        if (fromIdx !== -1 && toIdx !== -1) {
          moveQuestion(fromIdx, toIdx);
        }
        setDragState({ draggedId: null, overId: null });
      }
    }
  }), [moveQuestion, startAutoScroll, stopAutoScroll]);

  // Soruları yan yana / alt alta gruplara böl
  // items yanında indices da tutuyoruz, böylece render'da questions.indexOf çağırmaya gerek kalmaz
  const groupedQuestions = useMemo(() => {
    const groups = [];
    let i = 0;
    while (i < questions.length) {
      if (questions[i].nextLayout === 'side' && i + 1 < questions.length) {
        groups.push({ type: 'side', items: [questions[i], questions[i + 1]], indices: [i, i + 1] });
        i += 2;
      } else {
        groups.push({ type: 'single', items: [questions[i]], indices: [i] });
        i += 1;
      }
    }
    return groups;
  }, [questions]);

  const handlePrint = () => {
    if (view !== 'preview') {
      setView('preview');
      // Render ve KaTeX'in oturması için yeterli süre
      setTimeout(() => window.print(), 500);
      return;
    }
    window.print();
  };

  const handleDownloadPDF = () => {
    // Chrome'un kendi yazdırma penceresini aç; oradan "PDF olarak kaydet" seçilir.
    // En sade ve güvenilir yöntem (LaTeX birebir, donma yok).
    handlePrint();
  };

  const handleDownloadWord = async (retry = 0) => {
    // Önizleme görünümünde değilse otomatik olarak geç ve bekle ki DOM hazırlansın
    if (view !== 'preview') {
      setView('preview');
      setTimeout(() => handleDownloadWord(0), 500);
      return;
    }

    // printRef henüz bağlanmadıysa birkaç kez tekrar dene
    if (!printRef.current) {
      if (retry < 10) {
        setTimeout(() => handleDownloadWord(retry + 1), 200);
        return;
      }
      alert('Önizleme henüz hazır değil. Lütfen önce "Önizle" sekmesine geçip birkaç saniye sonra tekrar deneyin.');
      return;
    }

    // Yazdırılacak sayfanın HTML'ini al
    const pageHtml = printRef.current.innerHTML;

    // KaTeX stillerini Word belgesine gömmek için al (yüklüyse)
    let katexCss = '';
    try {
      const katexLink = document.querySelector('link[data-katex]');
      if (katexLink) {
        const res = await fetch(katexLink.href);
        if (res.ok) katexCss = await res.text();
      }
    } catch (e) {
      // CORS veya başka bir sebepten yüklenmeyebilir; matematik biraz farklı görünebilir ama belge yine çalışır
      console.warn('KaTeX CSS Word belgesi için yüklenemedi:', e);
    }

    // Word'ün anlayacağı formatta tam bir HTML belgesi oluştur.
    const docTitle = `${meta.academicYear} Eğitim ve Öğretim Yılı ${meta.schoolName || '[Okul Adı]'} ${meta.grade || '[Sınıf Seviyesi]'} ${meta.term}. Dönem ${meta.examNumber}. ${meta.subject || '[Ders]'} Yazılısı`;
    const wordDoc = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>${docTitle}</title>
<!--[if gte mso 9]>
<xml>
  <w:WordDocument>
    <w:View>Print</w:View>
    <w:Zoom>100</w:Zoom>
    <w:DoNotOptimizeForBrowser/>
  </w:WordDocument>
</xml>
<![endif]-->
<style>
  @page {
    size: A4;
    margin: 15mm 15mm 15mm 15mm;
    mso-page-orientation: portrait;
  }
  body {
    font-family: 'Times New Roman', serif;
    font-size: 12pt;
    margin: 0;
    padding: 0;
  }
  div.print-page {
    width: 100%;
    padding: 0;
    margin: 0;
    box-shadow: none;
    background: white;
  }
  table { border-collapse: collapse; }
  .question-block { page-break-inside: avoid; }
  svg { display: inline-block; }
  ${katexCss}
</style>
</head>
<body>
${pageHtml}
</body>
</html>`;

    // Dosya adı
    const safeName = (meta.subject || 'Yazili')
      .replace(/[^\w\sğüşıöçĞÜŞİÖÇ-]/g, '')
      .trim()
      .replace(/\s+/g, '_');
    const fileName = `MB-Yazili_${safeName || 'Yazili'}_${meta.term || 'I'}D_${meta.examNumber || 'I'}Yazili.doc`;

    // İndirme tetikle (Blob yöntemi)
    let downloaded = false;
    try {
      const blob = new Blob(['\ufeff', wordDoc], { type: 'application/msword;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      downloaded = true;
    } catch (e) {
      console.warn('Blob indirme başarısız, yedek yönteme geçiliyor:', e);
    }

    // WebView/APK'da Blob çalışmazsa: data URI ile yeni sekmede aç
    if (!downloaded) {
      try {
        const dataUri = 'data:application/msword;charset=utf-8,' + encodeURIComponent('\ufeff' + wordDoc);
        const w = window.open(dataUri, '_blank');
        if (!w) {
          // Pop-up da engellendiyse aynı sekmede aç
          window.location.href = dataUri;
        }
      } catch (e) {
        alert('Word belgesi oluşturulamadı. Lütfen Chrome tarayıcısında açmayı deneyin.');
      }
    }
  };

  const titleText = `${meta.academicYear} Eğitim ve Öğretim Yılı ${meta.schoolName || '[Okul Adı]'} ${meta.grade || '[Sınıf Seviyesi]'} ${meta.term}. Dönem ${meta.examNumber}. ${meta.subject || '[Ders]'} Yazılısı`;

  return (
    <div className="min-h-screen bg-slate-100">
      <style>{`
        @media print {
          .no-print { display: none !important; }
          /* Arka planları (kareli/noktalı/çizgili zemin) yazdırmada da bas */
          * {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            color-adjust: exact !important;
          }
          .print-page {
            box-shadow: none !important;
            margin: 0 !important;
            padding: 0 !important;
            page-break-after: always;
          }
          .print-page:last-child {
            page-break-after: auto;
          }
          body { background: white !important; }
          .question-block { page-break-inside: avoid; }
        }
        /* Her fiziksel sayfaya üstten ve alttan boşluk (içerik 2. sayfaya taşsa da geçerli) */
        @page {
          size: A4;
          margin: 15mm;
        }
        .print-page {
          width: 210mm;
          min-height: 297mm;
          padding: 15mm;
          background: white;
          margin: 1rem auto;
          box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .latex-inline {
          display: inline-flex;
          align-items: center;
          vertical-align: middle;
        }
      `}</style>

      {/* Üst bar */}
      <div className="no-print bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3">
        <div className="max-w-6xl mx-auto">
          <h1 className="text-lg font-bold text-slate-800 text-center mb-2 flex items-center justify-center gap-2">
            <img src={MB_LOGO} alt="MB-Yazılı" style={{ width: 32, height: 32, borderRadius: 7 }} />
            MB-Yazılı
          </h1>
          <div className="flex gap-2 flex-wrap justify-center">
            <button
              onClick={() => setView('edit')}
              className={`px-3 py-1.5 rounded text-sm ${view === 'edit' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-700'}`}
            >Düzenle</button>
            <button
              onClick={() => setView('preview')}
              className={`px-3 py-1.5 rounded text-sm ${view === 'preview' ? 'bg-slate-800 text-white' : 'bg-slate-200 text-slate-700'}`}
            >Önizle</button>
            <button onClick={() => handleDownloadWord(0)} className="px-3 py-1.5 rounded text-sm bg-indigo-600 text-white hover:bg-indigo-700 flex items-center gap-1">
              <FileText className="w-4 h-4" /> Word
            </button>
            <button onClick={handleDownloadPDF} className="px-3 py-1.5 rounded text-sm bg-green-600 text-white hover:bg-green-700 flex items-center gap-1">
              <Download className="w-4 h-4" /> PDF
            </button>
            <button onClick={handlePrint} className="px-3 py-1.5 rounded text-sm bg-blue-600 text-white hover:bg-blue-700 flex items-center gap-1">
              <Printer className="w-4 h-4" /> Yazdır
            </button>
            <button onClick={() => setShowSavePanel(true)} className="px-3 py-1.5 rounded text-sm bg-amber-500 text-white hover:bg-amber-600 flex items-center gap-1">
              <Save className="w-4 h-4" /> Yazılılarım
            </button>
          </div>
        </div>
      </div>

      {/* Yazılılarım paneli */}
      {showSavePanel && (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto no-print">
          <div className="bg-white rounded-lg shadow-2xl max-w-lg w-full p-4 sm:p-6 my-2 sm:my-4">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-slate-800">Yazılılarım</h3>
              <button onClick={() => setShowSavePanel(false)} className="text-slate-500 hover:text-slate-700 text-2xl">×</button>
            </div>

            {/* Kaydet */}
            <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded">
              <div className="text-sm font-semibold text-slate-700 mb-2">Bu yazılıyı kaydet</div>
              <div className="flex gap-2">
                <input
                  type="text"
                  value={saveName}
                  onChange={(e) => setSaveName(e.target.value)}
                  placeholder="Yazılı adı (örn: 7A Matematik 1. Yazılı)"
                  className="flex-1 border border-slate-300 rounded px-2 py-1.5 text-sm"
                />
                <button onClick={() => saveToStorage(saveName)}
                  className="px-3 py-1.5 bg-amber-500 text-white rounded hover:bg-amber-600 text-sm whitespace-nowrap flex items-center gap-1">
                  <Save className="w-4 h-4" /> Kaydet
                </button>
              </div>
            </div>

            {/* Kayıtlı liste */}
            <div className="mb-4">
              <div className="text-sm font-semibold text-slate-700 mb-2">Kayıtlı yazılılar</div>
              {savedList === null ? (
                <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded">
                  Bu ortamda tarayıcı kaydı kullanılamıyor (örn. Claude önizlemesi). Gerçek sitede (Vercel) çalışır.
                  Şimdilik aşağıdaki <b>JSON indir</b> ile dosyaya kaydedebilirsiniz.
                </div>
              ) : savedList.length === 0 ? (
                <div className="text-xs text-slate-400">Henüz kayıt yok.</div>
              ) : (
                <div className="space-y-1 max-h-60 overflow-y-auto">
                  {savedList.map((item) => (
                    <div key={item.name} className="flex items-center gap-2 border border-slate-200 rounded p-2">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium truncate">{item.name}</div>
                        <div className="text-[11px] text-slate-400">
                          {item.questionCount} soru · {item.savedAt ? new Date(item.savedAt).toLocaleString('tr-TR') : ''}
                        </div>
                      </div>
                      <button onClick={() => loadFromStorage(item.name)}
                        className="px-2 py-1 text-xs bg-slate-700 text-white rounded hover:bg-slate-800 flex items-center gap-1">
                        <FolderOpen className="w-3 h-3" /> Aç
                      </button>
                      <button onClick={() => deleteFromStorage(item.name)}
                        className="p-1 text-red-500 hover:text-red-700">
                        <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* JSON dışa/içe aktar */}
            <div className="border-t border-slate-200 pt-3">
              <div className="text-sm font-semibold text-slate-700 mb-2">Dosyaya yedekle / geri yükle</div>
              <div className="text-[11px] text-slate-500 mb-2">
                Yazılıyı bilgisayarına/telefonuna dosya olarak indir, sonra istediğin zaman geri yükle. Her ortamda çalışır, başka cihaza taşıyabilirsin.
              </div>
              <div className="flex gap-2">
                <button onClick={exportJson}
                  className="flex-1 px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 text-sm flex items-center justify-center gap-1">
                  <Download className="w-4 h-4" /> JSON indir
                </button>
                <label className="flex-1 px-3 py-1.5 border border-slate-300 rounded hover:bg-slate-100 text-sm flex items-center justify-center gap-1 cursor-pointer">
                  <Upload className="w-4 h-4" /> JSON yükle
                  <input type="file" accept="application/json,.json" onChange={importJson}
                    style={{ position: 'absolute', width: 1, height: 1, opacity: 0, pointerEvents: 'none' }} />
                </label>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Düzenleme görünümü */}
      {view === 'edit' && (
        <div className="max-w-4xl mx-auto p-4">
          {/* Yazılı bilgileri */}
          <div className="bg-white rounded-lg shadow p-4 mb-4">
            <h2 className="font-bold text-slate-800 mb-3 flex items-center gap-2"><Settings className="w-4 h-4" /> Yazılı Bilgileri</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-slate-600">Okul Adı</label>
                <input type="text" value={meta.schoolName} onChange={(e) => setMeta({ ...meta, schoolName: e.target.value })}
                  placeholder="örn: 23 Nisan İmam Hatip Ortaokulu"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Eğitim Öğretim Yılı</label>
                <input type="text" value={meta.academicYear} onChange={(e) => setMeta({ ...meta, academicYear: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Ders Adı</label>
                <input type="text" value={meta.subject} onChange={(e) => setMeta({ ...meta, subject: e.target.value })}
                  placeholder="örn: Matematik"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Sınıf Seviyesi</label>
                <input type="text" value={meta.grade} onChange={(e) => setMeta({ ...meta, grade: e.target.value })}
                  placeholder="örn: 7. Sınıf"
                  className="w-full border border-slate-300 rounded px-2 py-1" />
              </div>
              <div>
                <label className="text-xs text-slate-600">Dönem</label>
                <select value={meta.term} onChange={(e) => setMeta({ ...meta, term: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1">
                  <option value="I">I. Dönem</option>
                  <option value="II">II. Dönem</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-slate-600">Kaçıncı Yazılı</label>
                <select value={meta.examNumber} onChange={(e) => setMeta({ ...meta, examNumber: e.target.value })}
                  className="w-full border border-slate-300 rounded px-2 py-1">
                  <option value="I">I. Yazılı</option>
                  <option value="II">II. Yazılı</option>
                  <option value="III">III. Yazılı</option>
                </select>
              </div>
            </div>

            <div className="mt-3">
              <label className="text-xs text-slate-600">Başlık yazı stili</label>
              <TextStyleControls style={headerStyle} onChange={setHeaderStyle} compact />
            </div>

            <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded">
              <div className="text-xs text-slate-500 mb-1">Başlık önizleme:</div>
              <div className="text-center" style={styleToCSS(headerStyle)}>{titleText}</div>
            </div>

            <div className="mt-4">
              <label className="text-xs text-slate-600">Yazılının sonuna eklenecek not (öğrencilere mesaj)</label>
              <textarea value={meta.endNote} onChange={(e) => setMeta({ ...meta, endNote: e.target.value })}
                placeholder="örn: Başarılar dilerim. Süre 40 dakikadır."
                className="w-full border border-slate-300 rounded p-2 mt-1 min-h-[60px]" />
              <div className="mt-2">
                <label className="text-xs text-slate-600">Son not yazı stili</label>
                <TextStyleControls style={endNoteStyle} onChange={setEndNoteStyle} compact />
              </div>
            </div>
          </div>

          {/* Sorular */}
          <div className="bg-white rounded-lg shadow p-4">
            <div className="flex justify-between items-center mb-3">
              <h2 className="font-bold text-slate-800">Sorular ({questions.length})</h2>
              <div className="text-sm text-slate-600">
                Toplam puan: <span className="font-bold">{questions.reduce((s, q) => s + (q.points || 0), 0)}</span>
              </div>
            </div>

            {questions.length > 1 && (
              <div className="text-xs text-slate-500 mb-2 bg-slate-50 border border-slate-200 rounded px-3 py-1.5">
                💡 Soruları yeniden sıralamak için sol baştaki <GripVertical className="inline w-3.5 h-3.5" /> tutamacından sürükleyin veya ok butonlarını kullanın.
              </div>
            )}

            {questions.map((q, i) => (
              <QuestionEditorRow
                key={q.id}
                question={q}
                index={i}
                totalQuestions={questions.length}
                updateQuestion={updateQuestion}
                deleteQuestion={deleteQuestion}
                moveQuestion={moveQuestion}
                makeDragHandlers={makeDragHandlers}
                isDragging={dragState.draggedId === q.id}
                isDragOver={dragState.overId === q.id && dragState.draggedId !== q.id}
              />
            ))}

            <button onClick={addQuestion} className="w-full border-2 border-dashed border-slate-300 rounded-lg py-4 text-slate-600 hover:bg-slate-50 flex items-center justify-center gap-2">
              <Plus className="w-5 h-5" /> Yeni Soru Ekle
            </button>
          </div>
        </div>
      )}

      {/* Önizleme / yazdırma görünümü */}
      {view === 'preview' && (
        <div ref={printRef}>
          <div className="print-page">
            {/* Başlık */}
            <div className="border-2 border-slate-800 p-3 mb-4">
              <div className="text-center" style={styleToCSS(headerStyle)}>
                {titleText}
              </div>
              <div className="grid grid-cols-4 gap-2 mt-3 text-sm" style={{ fontFamily: 'Times New Roman' }}>
                <div>Ad: ..........................</div>
                <div>Soyad: ..........................</div>
                <div>Numara: ..........................</div>
                <div>Sınıf: ..........................</div>
              </div>
              <div className="mt-2 text-right text-sm" style={{ fontFamily: 'Times New Roman' }}>
                <span className="inline-block border border-slate-800 px-4 py-1">
                  Puan: ........... / 100
                </span>
              </div>
            </div>

            {/* Sorular */}
            {groupedQuestions.map((group, gi) => {
              if (group.type === 'side') {
                return (
                  <div key={gi} className="grid grid-cols-2 gap-4">
                    <div className="border-r border-slate-300 pr-3">
                      <QuestionDisplay question={group.items[0]} index={group.indices[0]} halfWidth />
                    </div>
                    <div className="pl-3">
                      <QuestionDisplay question={group.items[1]} index={group.indices[1]} halfWidth />
                    </div>
                  </div>
                );
              }
              return (
                <QuestionDisplay key={gi} question={group.items[0]} index={group.indices[0]} />
              );
            })}

            {/* Son not */}
            {meta.endNote && (
              <div className="mt-6 pt-3 border-t border-slate-400" style={{ ...styleToCSS(endNoteStyle), whiteSpace: 'pre-wrap' }}>
                {meta.endNote}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Altbilgi - hazırlayan */}
      <div className="no-print text-center text-xs text-slate-400 py-4">
        Hazırlayan: Mahmut Bektaş
      </div>
    </div>
  );
}

    // ===== Uygulamayı başlat =====
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<YaziliApp />);
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<div style="padding:2rem;font-family:system-ui,sans-serif;color:#b91c1c;text-align:center;">' +
        '<h2>Uygulama başlatılamadı</h2>' +
        '<p>İnternet bağlantınızı kontrol edin. Bu uygulama açılırken internet gerektirir ' +
        '(React, matematik ve PDF kütüphaneleri internetten yüklenir).</p>' +
        '<p style="font-size:0.8rem;color:#64748b;">Hata: ' + (e && e.message ? e.message : e) + '</p>' +
        '</div>';
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker
                .register("/serviceWorker.js")
                .then((registration) => {
                    console.log("SW registration successful");
                });
        });
    }
  </script>
</body>
</html>
