// Font, kalınlık, boyut seçici
const TextStyleControls = ({ style, onChange, compact = false }) => {
  const fonts = [
    'Arial', 'Times New Roman', 'Calibri', 'Verdana', 'Georgia',
    'Tahoma', 'Courier New', 'Comic Sans MS', 'Trebuchet MS'
  ];
  return (
    <div className={`flex items-center gap-1 ${compact ? 'text-xs' : 'text-sm'} flex-wrap`}>
      <select
        value={style.fontFamily}
        onChange={(e) => onChange({ ...style, fontFamily: e.target.value })}
        className="border border-slate-300 rounded px-1 py-0.5 bg-white"
      >
        {fonts.map(f => <option key={f} value={f} style={{ fontFamily: f }}>{f}</option>)}
      </select>
      <select
        value={style.fontSize}
        onChange={(e) => onChange({ ...style, fontSize: parseInt(e.target.value) })}
        className="border border-slate-300 rounded px-1 py-0.5 bg-white w-14"
      >
        {[8,9,10,11,12,13,14,15,16,18,20,22,24,28,32,36,40,48].map(s => (
          <option key={s} value={s}>{s}</option>
        ))}
      </select>
      <button
        onClick={() => onChange({ ...style, fontWeight: style.fontWeight === 'bold' ? 'normal' : 'bold' })}
        className={`px-2 py-0.5 border rounded font-bold ${style.fontWeight === 'bold' ? 'bg-slate-700 text-white' : 'bg-white text-slate-700 border-slate-300'}`}
      >K</button>
      <button
        onClick={() => onChange({ ...style, fontStyle: style.fontStyle === 'italic' ? 'normal' : 'italic' })}
        className={`px-2 py-0.5 border rounded italic ${style.fontStyle === 'italic' ? 'bg-slate-700 text-white' : 'bg-white text-slate-700 border-slate-300'}`}
      >İ</button>
      <button
        onClick={() => onChange({ ...style, textDecoration: style.textDecoration === 'underline' ? 'none' : 'underline' })}
        className={`px-2 py-0.5 border rounded underline ${style.textDecoration === 'underline' ? 'bg-slate-700 text-white' : 'bg-white text-slate-700 border-slate-300'}`}
      >A</button>
    </div>
  );
};

const defaultStyle = (size = 12) => ({
  fontFamily: 'Times New Roman',
  fontSize: size,
  fontWeight: 'normal',
  fontStyle: 'normal',
  textDecoration: 'none'
});

const styleToCSS = (s) => ({
  fontFamily: s.fontFamily,
  fontSize: `${s.fontSize}pt`,
  fontWeight: s.fontWeight,
  fontStyle: s.fontStyle,
  textDecoration: s.textDecoration
});

// KaTeX CDN'den yüklensin diye global state
let katexLoadPromise = null;
const loadKatex = () => {
  if (typeof window === 'undefined') return Promise.resolve();
  if (window.katex) return Promise.resolve(window.katex);
  if (katexLoadPromise) return katexLoadPromise;

  katexLoadPromise = new Promise((resolve, reject) => {
    // CSS
    if (!document.querySelector('link[data-katex]')) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css';
      link.setAttribute('data-katex', 'true');
      document.head.appendChild(link);
    }
    // JS
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';
    script.onload = () => resolve(window.katex);
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return katexLoadPromise;
};

// PDF.js CDN'den yüklensin diye
let pdfjsLoadPromise = null;
const loadPdfJs = () => {
  if (typeof window === 'undefined') return Promise.resolve();
  if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if (pdfjsLoadPromise) return pdfjsLoadPromise;

  // Babel'in dokunmaması için dinamik import'u bir module script içinde, runtime'da çalıştırıyoruz
  pdfjsLoadPromise = new Promise((resolve, reject) => {
    window.__pdfjsResolve = (mod) => {
      window.pdfjsLib = mod;
      mod.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs';
      resolve(mod);
    };
    window.__pdfjsReject = (err) => reject(err);
    const s = document.createElement('script');
    s.type = 'module';
    s.textContent =
      "import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs')" +
      ".then(m => window.__pdfjsResolve(m)).catch(e => window.__pdfjsReject(e));";
    document.head.appendChild(s);
  });
  return pdfjsLoadPromise;
};

// Global olarak KaTeX yüklenince haberdar olmak isteyen bileşenler
let _katexReady = typeof window !== 'undefined' && !!window.katex;
const _katexSubscribers = new Set();
const _notifyKatexReady = () => {
  _katexReady = true;
  _katexSubscribers.forEach(fn => fn());
};

// KaTeX yüklenip yüklenmediğini izleyen hook
const useKatex = () => {
  const [ready, setReady] = useState(_katexReady);
  useEffect(() => {
    if (_katexReady) return;
    const onReady = () => setReady(true);
    _katexSubscribers.add(onReady);
    loadKatex().then(() => _notifyKatexReady()).catch(() => {});
    return () => { _katexSubscribers.delete(onReady); };
  }, []);
  return ready;
};

// HTML escape — kullanıcı metnini güvenli HTML'e çevir
const escapeHtml = (s) => {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};

// KaTeX ile LaTeX render et (HTML string döner)
const renderLatex = (latex, displayMode = false) => {
  if (!latex) return '<span style="color:#94a3b8">...</span>';
  if (typeof window === 'undefined' || !window.katex) {
    return `<span style="font-family:monospace;color:#64748b">${escapeHtml(latex)}</span>`;
  }
  try {
    return window.katex.renderToString(latex, {
      throwOnError: false,
      displayMode,
      errorColor: '#dc2626',
      strict: false,
      trust: true,
      macros: {
        // Türkçe matematik için yararlı kısaltmalar
        '\\R': '\\mathbb{R}',
        '\\N': '\\mathbb{N}',
        '\\Z': '\\mathbb{Z}',
        '\\Q': '\\mathbb{Q}'
      }
    });
  } catch (e) {
    return `<span style="color:#dc2626">${escapeHtml(latex)}</span>`;
  }
};

// Bir LaTeX ifadesini render eden bileşen (KaTeX yüklenmesini bekler)
const Latex = ({ children, displayMode = false }) => {
  const ready = useKatex();
  const html = ready ? renderLatex(children, displayMode) : `<span style="font-family:monospace;color:#64748b">${escapeHtml(children || '')}</span>`;
  return <span dangerouslySetInnerHTML={{ __html: html }} />;
};

// Soru içindeki $...$ ve $$...$$ latex parçalarını render et
// Cache: aynı metin için aynı sonucu döndürür, sürekli yeniden parse etmemek için
const _renderCache = new Map();
const renderQuestionText = (text) => {
  if (!text) return '';
  // Cache anahtarı KaTeX'in yüklü olup olmadığına da bağlı
  const katexReady = typeof window !== 'undefined' && !!window.katex;
  const cacheKey = (katexReady ? '1:' : '0:') + text;
  if (_renderCache.has(cacheKey)) return _renderCache.get(cacheKey);

  const parts = text.split(/(\$\$[^$]+\$\$|\$[^$\n]+\$)/g);
  const result = parts.map((p) => {
    if (p.startsWith('$$') && p.endsWith('$$')) {
      return `<span class="latex-block">${renderLatex(p.slice(2, -2), true)}</span>`;
    }
    if (p.startsWith('$') && p.endsWith('$') && p.length > 2) {
      return `<span class="latex-inline">${renderLatex(p.slice(1, -1), false)}</span>`;
    }
    // LaTeX olmayan düz metin: HTML kaçışı yap, sonra \n -> <br/>
    return escapeHtml(p).replace(/\n/g, '<br/>');
  }).join('');

  // Cache büyümesin diye limit
  if (_renderCache.size > 500) {
    const firstKey = _renderCache.keys().next().value;
    _renderCache.delete(firstKey);
  }
  _renderCache.set(cacheKey, result);
  return result;
};

// Sayı input'u: kullanıcı silip yeniden yazarken "boş" durumu da kabul eder.
// Geçerli bir sayı girildiğinde parent'a iletir, geçersiz/boş durumda parent değeri korunur.
const NumericInput = ({ value, onChange, integer = false, className = '', ...rest }) => {
  // İçeride yazıyı raw string olarak tutuyoruz
  const [raw, setRaw] = useState(String(value));
  const inputRef = useRef(null);

  // Dışarıdan value değişirse ve input odakta değilse raw'ı senkronla
  useEffect(() => {
    if (document.activeElement === inputRef.current) return; // odakta, dokunma
    const parsed = integer ? parseInt(raw, 10) : parseFloat(raw);
    if (isNaN(parsed) || parsed !== value) {
      setRaw(String(value));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value]);

  return (
    <input
      ref={inputRef}
      type="text"
      inputMode="decimal"
      value={raw}
      onChange={(e) => {
        const v = e.target.value;
        setRaw(v);
        // Boş veya yarım sayı ise parent'a bildirme (parent eski değeri korur)
        if (v === '' || v === '-' || v === '.' || v === '-.') return;
        const parsed = integer ? parseInt(v, 10) : parseFloat(v);
        if (!isNaN(parsed)) onChange(parsed);
      }}
      onBlur={() => {
        // Odak çıkınca: raw geçerli sayı değilse parent'taki değere geri dön
        const parsed = integer ? parseInt(raw, 10) : parseFloat(raw);
        if (isNaN(parsed)) {
          setRaw(String(value));
        } else {
          // Görüntüyü normalize et (örn. "5." → "5")
          setRaw(String(parsed));
        }
      }}
      className={className}
      {...rest}
    />
  );
};

const NumberLineEditor = ({ onSave, onClose, initial }) => {
  const [start, setStart] = useState(initial?.start ?? 0);
  const [end, setEnd] = useState(initial?.end ?? 10);
  const [tickHeight, setTickHeight] = useState(initial?.tickHeight ?? 10);
  const [mainTickHeight, setMainTickHeight] = useState(initial?.mainTickHeight ?? 16);
  const [divisions, setDivisions] = useState(initial?.divisions ?? []); // [{from, to, parts}]
  const [labels, setLabels] = useState(initial?.labels ?? {}); // { position: { above: '', below: '' } }
  const [showMainNumbers, setShowMainNumbers] = useState(initial?.showMainNumbers ?? true);

  // Yeni bölme ekleme formu
  const [divFrom, setDivFrom] = useState('');
  const [divTo, setDivTo] = useState('');
  const [divParts, setDivParts] = useState(3);
  const [divTickHeight, setDivTickHeight] = useState(8);

  // LaTeX editörü için: hangi etiket için açıldı? { pos, where }
  const [latexTarget, setLatexTarget] = useState(null);

  const addDivision = () => {
    const f = parseFloat(divFrom);
    const t = parseFloat(divTo);
    const p = parseInt(divParts);
    if (isNaN(f) || isNaN(t) || isNaN(p) || p < 2) return;
    setDivisions([...divisions, { from: f, to: t, parts: p, tickHeight: divTickHeight, id: uniqueId() }]);
    setDivFrom(''); setDivTo('');
  };

  const removeDivision = (id) => {
    setDivisions(divisions.filter(d => d.id !== id));
  };

  // SVG çizimi için boyutlar
  const svgWidth = 700;
  const svgHeight = 120;
  const padding = 40;
  const lineY = 60;
  const range = end - start;
  const xOf = (val) => padding + ((val - start) / range) * (svgWidth - 2 * padding);

  // Aralık geçerli mi?
  const validRange = isFinite(start) && isFinite(end) && (end - start > 0) && (end - start <= 1000);

  // Tüm çentik pozisyonlarını topla (sadece geçerli aralıkta)
  const allTicks = [];
  if (validRange) {

    // Bölme çentikleri
    divisions.forEach((div, di) => {
      const step = (div.to - div.from) / div.parts;
      for (let j = 1; j < div.parts; j++) {
        const pos = div.from + step * j;
        allTicks.push({ pos, height: div.tickHeight, isMain: false, key: `div-${di}-${j}` });
      }
    });
  }

  const updateLabel = (pos, where, value) => {
    const key = pos.toString();
    setLabels({
      ...labels,
      [key]: { ...(labels[key] || {}), [where]: value }
    });

  const getLabel = (pos, where) => {
    const key = pos.toString();
    const v = labels[key]?.[where];
    // null = açıkça gizlendi, undefined = dokunulmadı
    if (v === null) return null;
    return v ?? '';
  };

  const handleSave = () => {
    onSave({ start, end, tickHeight, mainTickHeight, divisions, labels, showMainNumbers });

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto">

            <label className="text-xs text-slate-600">Bitiş</label>

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label className="text-xs text-slate-600">Ana çentik boyu (px)</label>
            <NumericInput value={mainTickHeight} onChange={setMainTickHeight} integer

            </label>
          </div>
        </div>

        {/* Bölme ekle */}
        <div className="border border-slate-200 rounded p-3 mb-4 bg-slate-50">
          <div className="text-sm font-semibold mb-2">Yeni eş bölme ekle</div>
          <div className="grid grid-cols-5 gap-2 items-end">

            const aboveVal = getLabel(t.pos, 'above');

            const belowHidden = belowVal === null;
            return (
            <div key={`edit-${t.key}`} className="grid grid-cols-3 gap-2 mb-1 items-center">

                  disabled={aboveHidden}

                  onClick={() => updateLabel(t.pos, 'above', aboveHidden ? '' : null)}

              </div>
              <div className="flex gap-1">
                <input
                  type="text"
                  value={belowHidden ? '' : (belowVal || '')}
                  onChange={(e) => updateLabel(t.pos, 'below', e.target.value)}
                  disabled={belowHidden}
                  className={`flex-1 min-w-0 border border-slate-300 rounded px-2 py-0.5 text-sm ${belowHidden ? 'bg-slate-100 line-through text-slate-400' : ''}`}
                  placeholder={t.isMain && showMainNumbers ? String(t.pos) : 'altına yazılacak'}
                />
                <button
                  type="button"
                  onClick={() => setLatexTarget({ pos: t.pos, where: 'below' })}
                  disabled={belowHidden}
                  className="text-xs px-2 py-0.5 border border-slate-300 rounded hover:bg-slate-100 font-mono font-bold disabled:opacity-40"
                  title="LaTeX editörü"
                >fx</button>
                <button
                  type="button"
                  onClick={() => updateLabel(t.pos, 'below', belowHidden ? '' : null)}
                  className={`text-xs px-2 py-0.5 border rounded ${belowHidden ? 'bg-slate-700 text-white border-slate-700' : 'border-slate-300 hover:bg-slate-100'}`}
                  title={belowHidden ? 'Alt yazıyı geri aç' : 'Alt yazıyı gizle (otomatik sayıyı da)'}
                >{belowHidden ? '👁' : '🚫'}</button>
              </div>
            </div>
            );
          })}
        </div>

        <div className="flex justify-end gap-2">
          <button onClick={onClose} className="px-4 py-2 border border-slate-300 rounded hover:bg-slate-100">İptal</button>
          <button onClick={handleSave} className="px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-900">Soruya Ekle</button>
        </div>

        {latexTarget && (
          <LatexEditor
            onInsert={(latex) => {
              // Mevcut etiketin sonuna ekle (kullanıcı zaten yazdıysa korusun)
              const existing = getLabel(latexTarget.pos, latexTarget.where);
              const newValue = existing ? (existing + ' ' + latex) : latex;
              updateLabel(latexTarget.pos, latexTarget.where, newValue);
            }}
            onClose={() => setLatexTarget(null)}
          />
        )}
      </div>
    </div>
  );
};

// Sayı doğrusu render (yazılı kağıdında)
const NumberLineDisplayImpl = ({ data }) => {
  // KaTeX yüklendiğinde re-render için
  useKatex();
  if (!data) return null;
  const { start, end, mainTickHeight, divisions, labels, showMainNumbers } = data;
  // Geçersiz aralık koruması: çok büyük ya da geçersiz aralıklarda render etmeyi reddet
  if (typeof start !== 'number' || typeof end !== 'number' || !isFinite(start) || !isFinite(end)) return null;
  if (end - start <= 0) return null;
  if (end - start > 1000) return null; // Çok fazla çentik tarayıcıyı kilitler
  const svgWidth = 600;
  const svgHeight = 90;
  const padding = 35;
  const lineY = 45;
  const range = end - start;
  const xOf = (val) => padding + ((val - start) / range) * (svgWidth - 2 * padding);

  const allTicks = [];
  for (let i = Math.ceil(start); i <= Math.floor(end); i++) {
    allTicks.push({ pos: i, height: mainTickHeight, isMain: true, key: `main-${i}` });
  }
  divisions.forEach((div, di) => {
    const step = (div.to - div.from) / div.parts;
    for (let j = 1; j < div.parts; j++) {
      const pos = div.from + step * j;
      allTicks.push({ pos, height: div.tickHeight, isMain: false, key: `div-${di}-${j}` });
    }
  });

  const getLabel = (pos, where) => {
    const key = pos.toString();
    const v = labels[key]?.[where];
    // null = açıkça gizlendi (hiçbir şey gösterilmesin), undefined = dokunulmadı (otomatik sayı kullanılabilir)
    if (v === null) return null;
    return v ?? '';
  };

  // Bir etiket LaTeX içeriyor mu? ($..$ veya $$..$$)
  const hasLatex = (s) => typeof s === 'string' && /\$[^$]+\$/.test(s);

  // foreignObject ile bir etiketi (LaTeX olabilir) çiz
  // anchor: 'above' veya 'below' — pozisyon farkı için
  // PDF üretilirken (html2canvas foreignObject'i render edemez) düz metne düşülür.
  const renderLabel = (text, x, y, anchor) => {
    const pdfMode = typeof window !== 'undefined' && window.__pdfRendering;
    if (pdfMode) {
      const plain = String(text ?? '').replace(/\$/g, '');
      const ty = anchor === 'above' ? y - 4 : y + 11;
      return <text x={x} y={ty} textAnchor="middle" fontSize="12" fontFamily="Times New Roman">{plain}</text>;
    }
    const fobjWidth = 60; // makul bir etiket genişliği
    const fobjHeight = 24;
    // x ortalı olacak şekilde foreignObject'in sol üst köşesi
    const fx = x - fobjWidth / 2;
    const fy = anchor === 'above' ? y - fobjHeight : y;
    return (
      <foreignObject x={fx} y={fy} width={fobjWidth} height={fobjHeight}>
        <div
          xmlns="http://www.w3.org/1999/xhtml"
          style={{
            width: '100%',
            height: '100%',
            display: 'flex',
            alignItems: anchor === 'above' ? 'flex-end' : 'flex-start',
            justifyContent: 'center',
            fontFamily: 'Times New Roman, serif',
            fontSize: '12px',
            lineHeight: 1.1,
            textAlign: 'center'
          }}
          dangerouslySetInnerHTML={{ __html: renderQuestionText(text) }}
        />
      </foreignObject>
    );
  };

  return (
    <svg
      viewBox={`0 0 ${svgWidth} ${svgHeight}`}
      preserveAspectRatio="xMidYMid meet"
      className="block"
      style={{ width: '100%', maxWidth: `${svgWidth}px`, height: 'auto' }}
    >
      <line x1={padding - 15} y1={lineY} x2={svgWidth - padding + 15} y2={lineY} stroke="#000" strokeWidth="1.5" />
      <polygon points={`${padding - 20},${lineY} ${padding - 10},${lineY - 5} ${padding - 10},${lineY + 5}`} fill="#000" />
      <polygon points={`${svgWidth - padding + 20},${lineY} ${svgWidth - padding + 10},${lineY - 5} ${svgWidth - padding + 10},${lineY + 5}`} fill="#000" />
      {allTicks.map(t => {
        const x = xOf(t.pos);
        const aboveLabel = getLabel(t.pos, 'above');
        const belowLabel = getLabel(t.pos, 'below');
        // null = açıkça gizli; '' veya undefined = otomatik kullan
        const aboveHidden = aboveLabel === null;
        const belowHidden = belowLabel === null;
        const defaultBelow = t.isMain && showMainNumbers && !belowHidden ? String(t.pos) : '';
        const finalAbove = aboveHidden ? '' : aboveLabel;
        const finalBelow = belowHidden ? '' : (belowLabel || defaultBelow);
        return (
          <g key={t.key}>
            <line x1={x} y1={lineY - t.height / 2} x2={x} y2={lineY + t.height / 2} stroke="#000" strokeWidth="1.2" />
            {finalAbove && (
              hasLatex(finalAbove)
                ? renderLabel(finalAbove, x, lineY - t.height / 2 - 3, 'above')
                : <text x={x} y={lineY - t.height / 2 - 5} textAnchor="middle" fontSize="12" fontFamily="Times New Roman">{finalAbove}</text>
            )}
            {finalBelow && (
              hasLatex(finalBelow)
                ? renderLabel(finalBelow, x, lineY + t.height / 2 + 2, 'below')
                : <text x={x} y={lineY + t.height / 2 + 13} textAnchor="middle" fontSize="12" fontFamily="Times New Roman">{finalBelow}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
};

// PDF artık window.print() ile alınıyor (foreignObject doğru basılır), bu yüzden
// memo güvenli ve performans için tercih edilir.
const NumberLineDisplay = React.memo(NumberLineDisplayImpl);

// ============== TABLO VE GRAFİKLER ==============

// Varsayılan renk paleti
const CHART_COLORS = ['#3b82f6', '#ef4444', '#22c55e', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'];

// Çetele işaretleri (卌 = 5'lik grup, kalanı tekli çizgi)
const tallyMarks = (n) => {
  let num = Math.floor(Number(n) || 0);
  if (num < 0) num = 0;
  if (num > 200) num = 200; // güvenlik sınırı (aşırı büyük değerlerde donmayı önle)
  const groups = Math.floor(num / 5);
  const rem = num % 5;
  let out = '';
  for (let i = 0; i < groups; i++) out += '卌 '; // 5'lik grup
  out += '|'.repeat(rem);
  return out.trim();
};

// Bir grafik değerini SAYIYA çevir (çizim için).
// Destekler: "5", "0.4", "1/3", "%25", "2,5" ve LaTeX: "$\frac{1}{3}$", "\dfrac{2}{5}", "\%25"
// Not: yüzde orana çevrilir (%25 -> 0.25), böylece "1/4" ile aynı değeri verir.
const parseChartNumber = (raw) => {
  if (raw === null || raw === undefined) return 0;
  if (typeof raw === 'number') return isNaN(raw) ? 0 : raw;
  let s = String(raw).trim();
  if (s === '' || s === 'NaN') return 0;
  // LaTeX süslemelerini temizle: $ işaretleri, \dfrac/\tfrac -> frac
  s = s.replace(/\$/g, '').trim();
  // LaTeX kesir: \frac{a}{b}, \dfrac{a}{b}, \tfrac{a}{b}
  const fracMatch = s.match(/\\[dt]?frac\s*\{\s*([^{}]+?)\s*\}\s*\{\s*([^{}]+?)\s*\}/);
  // Yüzde mi? "%25", "25%" veya "\%25"
  const isPercent = s.includes('%');
  let val;
  if (fracMatch) {
    const a = parseFloat(fracMatch[1].replace(',', '.'));
    const b = parseFloat(fracMatch[2].replace(',', '.'));
    val = (!isNaN(a) && !isNaN(b) && b !== 0) ? a / b : 0;
  } else {
    // LaTeX kalıntılarını ve yüzde işaretini temizle
    let t = s.replace(/\\%/g, '').replace(/%/g, '').replace(/\\[a-zA-Z]+/g, '').replace(/[{}]/g, '').trim();
    t = t.replace(',', '.');
    if (t.includes('/')) {
      const parts = t.split('/');
      if (parts.length === 2) {
        const a = parseFloat(parts[0]);
        const b = parseFloat(parts[1]);
        val = (!isNaN(a) && !isNaN(b) && b !== 0) ? a / b : 0;
      } else {
        val = 0;
      }
    } else {
      const n = parseFloat(t);
      val = isNaN(n) ? 0 : n;
    }
  }
  // Yüzdeyse orana çevir: %25 -> 0.25
  if (isPercent) val = val / 100;
  return val;
};

// Bir grafik değerini GÖSTERİM için biçimle. "1/3" -> $\frac{1}{3}$, "%25" -> %25, "5" -> 5
const displayChartValue = (raw) => {
  if (raw === null || raw === undefined) return '';
  const s = String(raw).trim();
  if (s === '' || s === 'NaN') return '';
  // Yüzde olduğu gibi göster
  if (s.includes('%')) return s;
  // Kesir -> LaTeX kesir
  if (s.includes('/')) {
    const parts = s.split('/');
    if (parts.length === 2 && parts[0].trim() !== '' && parts[1].trim() !== '') {
      return `$\\frac{${parts[0].trim()}}{${parts[1].trim()}}$`;
    }
  }
  return s;
};

const ChartDisplayImpl = ({ data }) => {
  useKatex();
  if (!data) return null;
  const { chartType, title, xLabel, yLabel, filled, rows = [], series = null } = data;
  const valid = rows.filter(r => r.label !== undefined);
  // Çoklu seri var mı? (sadece sütun grafiğinde geçerli)
  const multiSeries = Array.isArray(series) && series.length > 0;
  // maxVal: çoklu seride tüm değerlerin maksimumu
  const maxVal = multiSeries
    ? Math.max(1, ...valid.flatMap(r => (r.values || []).map(v => parseChartNumber(v))))
    : Math.max(1, ...valid.map(r => parseChartNumber(r.value)));
  const total = valid.reduce((s, r) => s + (parseChartNumber(r.value)), 0);

  const showVal = (v) => {
    if (!filled) return '';
    if (v === null || v === undefined) return '';
    // Sayı olarak NaN ise boş göster (eski hatalı kayıtlar için)
    if (typeof v === 'number' && isNaN(v)) return '';
    if (typeof v === 'string' && v.trim() === 'NaN') return '';
    return v;
  };

  // SVG içinde LaTeX destekli etiket: $...$ varsa foreignObject ile KaTeX, yoksa düz <text>
  // PDF üretilirken (html2canvas foreignObject'i render edemez) düz metne düşülür.
  const svgLabel = (txt, x, y, opts = {}) => {
    const { fontSize = 10, anchor = 'middle', fill = '#000', bold = false } = opts;
    const s = String(txt ?? '');
    if (s === '') return null;
    const hasMath = /\$[^$]+\$/.test(s);
    const pdfMode = typeof window !== 'undefined' && window.__pdfRendering;
    if (hasMath && !pdfMode && typeof window !== 'undefined' && window.katex) {
      const foW = 120, foH = fontSize * 2.2;
      const html = renderQuestionText(s);
      return (
        <foreignObject x={x - foW / 2} y={y - foH / 2} width={foW} height={foH} style={{ overflow: 'visible' }}>
          <div xmlns="http://www.w3.org/1999/xhtml"
            style={{ fontSize: `${fontSize}px`, fontFamily: 'Times New Roman', textAlign: 'center', lineHeight: 1, color: fill, fontWeight: bold ? 'bold' : 'normal' }}
            dangerouslySetInnerHTML={{ __html: html }} />
        </foreignObject>
      );
    }
    // PDF modunda veya KaTeX yokken: $...$ işaretlerini temizleyip düz metin göster
    const plain = s.replace(/\$/g, '');
    return <text x={x} y={y} textAnchor={anchor} fontSize={fontSize} fill={fill} fontWeight={bold ? 'bold' : 'normal'} fontFamily="Times New Roman">{plain}</text>;
  };

  // === TABLOLAR ===
  if (chartType === 'frequencyTable' || chartType === 'tallyTable') {
    const isTally = chartType === 'tallyTable';
    return (
      <div className="w-full" style={{ fontFamily: 'Times New Roman' }}>
        {title && <div className="text-center font-bold text-sm mb-1" dangerouslySetInnerHTML={{ __html: renderQuestionText(title) }} />}
        <table className="w-full border-collapse border border-black text-sm">
          <thead>
            <tr>
              <th className="border border-black px-2 py-1">{xLabel || 'Kategori'}</th>
              <th className="border border-black px-2 py-1">{yLabel || 'Sıklık'}</th>
            </tr>
          </thead>
          <tbody>
            {valid.map((r, i) => (
              <tr key={i}>
                <td className="border border-black px-2 py-1 text-center" dangerouslySetInnerHTML={{ __html: renderQuestionText(String(r.label ?? '')) }} />
                <td className="border border-black px-2 py-1 text-center" style={{ minHeight: '1.5em' }}>
                  {isTally
                    ? (filled ? tallyMarks(parseChartNumber(r.value)) : '')
                    : (filled ? <span dangerouslySetInnerHTML={{ __html: renderQuestionText(String(displayChartValue(r.value))) }} /> : '')}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  // === GRAFİKLER (SVG) ===
  const W = 360, H = 240;
  const padL = 40, padR = 20, padT = title ? 30 : 15, padB = 45;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const n = valid.length || 1;

  const svgWrap = (children) => (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', maxWidth: `${W}px`, height: 'auto' }} className="block mx-auto">
      {title && <text x={W/2} y={18} textAnchor="middle" fontSize="14" fontWeight="bold" fontFamily="Times New Roman">{title}</text>}
      {children}
    </svg>
  );

  // Y ekseni grid + etiketleri (sütun, çizgi, nokta için ortak)
  const yTicks = 5;
  const yAxis = () => {
    const ticks = [];
    for (let i = 0; i <= yTicks; i++) {
      const v = (maxVal / yTicks) * i;
      const y = padT + plotH - (plotH * i / yTicks);
      ticks.push(
        <g key={i}>
          <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="#e2e8f0" strokeWidth="1" />
          <text x={padL - 5} y={y + 4} textAnchor="end" fontSize="10" fontFamily="Times New Roman">{Math.round(v)}</text>
        </g>
      );
    }
    return ticks;
  };

  const axes = () => (
    <>
      <line x1={padL} y1={padT} x2={padL} y2={padT + plotH} stroke="#000" strokeWidth="1.2" />
      <line x1={padL} y1={padT + plotH} x2={W - padR} y2={padT + plotH} stroke="#000" strokeWidth="1.2" />
      {yLabel && <text x={12} y={padT + plotH/2} textAnchor="middle" fontSize="10" fontFamily="Times New Roman" transform={`rotate(-90 12 ${padT + plotH/2})`}>{yLabel}</text>}
      {xLabel && <text x={padL + plotW/2} y={H - 5} textAnchor="middle" fontSize="10" fontFamily="Times New Roman">{xLabel}</text>}
    </>
  );

  if (chartType === 'barChart') {
    const slot = plotW / n;
    if (multiSeries) {
      // Gruplu sütunlar: her kategoride series.length kadar sütun yan yana
      const groupW = slot * 0.7;
      const barW = groupW / series.length;
      const seriesColors = series.map((s, si) => s.color || CHART_COLORS[si % CHART_COLORS.length]);
      return svgWrap(
        <>
          {yAxis()}
          {axes()}
          {valid.map((r, i) => {
            const gx = padL + slot * i + (slot - groupW) / 2;
            return (
              <g key={i}>
                {(r.values || []).map((val, si) => {
                  const v = parseChartNumber(val);
                  const barH = filled ? (plotH * v / maxVal) : 0;
                  const x = gx + barW * si;
                  const y = padT + plotH - barH;
                  return (
                    <g key={si}>
                      {filled && <rect x={x} y={y} width={barW * 0.9} height={barH} fill={seriesColors[si]} />}
                      {filled && svgLabel(displayChartValue(val), x + barW * 0.45, y - 3, { fontSize: 8 })}
                    </g>
                  );
                })}
                <text x={gx + groupW/2} y={padT + plotH + 12} textAnchor="middle" fontSize="10" fontFamily="Times New Roman">{r.label}</text>
              </g>
            );
          })}
          {/* Lejant */}
          {series.map((s, si) => (
            <g key={si} transform={`translate(${padL + si * 80}, ${padT - 8})`}>
              <rect width="9" height="9" fill={seriesColors[si]} />
              <text x="12" y="8" fontSize="9" fontFamily="Times New Roman">{s.name || `Seri ${si+1}`}</text>
            </g>
          ))}
        </>
      );
    }
    const barW = slot * 0.6;
    return svgWrap(
      <>
        {yAxis()}
        {axes()}
        {valid.map((r, i) => {
          const v = parseChartNumber(r.value);
          const barH = filled ? (plotH * v / maxVal) : 0;
          const x = padL + slot * i + (slot - barW) / 2;
          const y = padT + plotH - barH;
          return (
            <g key={i}>
              {filled && <rect x={x} y={y} width={barW} height={barH} fill={r.color || CHART_COLORS[i % CHART_COLORS.length]} />}
              {svgLabel(r.label, x + barW/2, padT + plotH + 14, { fontSize: 10 })}
              {filled && svgLabel(displayChartValue(r.value), x + barW/2, y - 5, { fontSize: 9 })}
            </g>
          );
        })}
      </>
    );
  }

  if (chartType === 'lineChart') {
    const slot = plotW / n;
    const pts = valid.map((r, i) => {
      const v = parseChartNumber(r.value);
      const x = padL + slot * i + slot / 2;
      const y = filled ? (padT + plotH - (plotH * v / maxVal)) : (padT + plotH);
      return { x, y, v, raw: r.value, label: r.label };
    });
    const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
    return svgWrap(
      <>
        {yAxis()}
        {axes()}
        {filled && <path d={pathD} fill="none" stroke={CHART_COLORS[0]} strokeWidth="2" />}
        {pts.map((p, i) => (
          <g key={i}>
            {filled && <circle cx={p.x} cy={p.y} r="3.5" fill={CHART_COLORS[0]} />}
            {svgLabel(p.label, p.x, padT + plotH + 14, { fontSize: 10 })}
            {filled && svgLabel(displayChartValue(p.raw), p.x, p.y - 8, { fontSize: 9 })}
          </g>
        ))}
      </>
    );
  }

  // Nokta grafiği: dikey istiflenmiş noktalar (her nokta = 1 birim)
  if (chartType === 'dotChart') {
    const slot = plotW / n;
    const dotR = 6;          // nokta yarıçapı
    const dotGap = 16;       // noktalar arası dikey mesafe
    // En yüksek istif kaç nokta? Ona göre SVG yüksekliği (güvenlik sınırı: 60)
    const DOT_CAP = 60;
    const rawMax = filled ? Math.max(1, ...valid.map(r => parseChartNumber(r.value))) : 1;
    const maxDots = Math.min(DOT_CAP, rawMax);
    const neededTop = 20;    // üst boşluk
    const labelArea = 30;    // alt etiket alanı
    const dynH = Math.max(H, neededTop + maxDots * dotGap + labelArea + (title ? 20 : 0));
    const baseY = dynH - labelArea;
    return (
      <svg viewBox={`0 0 ${W} ${dynH}`} preserveAspectRatio="xMidYMid meet" style={{ width: '100%', maxWidth: `${W}px`, height: 'auto' }} className="block mx-auto">
        {title && <text x={W/2} y={18} textAnchor="middle" fontSize="14" fontWeight="bold" fontFamily="Times New Roman">{title}</text>}
        {/* x ekseni (taban çizgisi), oklu */}
        <line x1={padL - 5} y1={baseY} x2={W - padR} y2={baseY} stroke="#000" strokeWidth="1.5" />
        <polygon points={`${W - padR + 5},${baseY} ${W - padR - 3},${baseY - 4} ${W - padR - 3},${baseY + 4}`} fill="#000" />
        {xLabel && <text x={padL + plotW/2} y={dynH - 4} textAnchor="middle" fontSize="10" fontFamily="Times New Roman">{xLabel}</text>}
        {valid.map((r, i) => {
          const v = parseChartNumber(r.value);
          const cx = padL + slot * i + slot / 2;
          const color = r.color || CHART_COLORS[i % CHART_COLORS.length];
          const dots = [];
          if (filled) {
            const cnt = Math.min(60, Math.max(0, Math.floor(v)));
            for (let k = 0; k < cnt; k++) {
              const cy = baseY - dotGap * (k + 0.7);
              dots.push(<circle key={k} cx={cx} cy={cy} r={dotR} fill={color} />);
            }
          }
          return (
            <g key={i}>
              {dots}
              {svgLabel(r.label, cx, baseY + 16, { fontSize: 10 })}
            </g>
          );
        })}
      </svg>
    );
  }

  if (chartType === 'pieChart') {
    const cx = W / 2, cy = padT + plotH / 2 + 5, rad = Math.min(plotW, plotH) / 2 - 5;
    let angle = -Math.PI / 2; // tepeden başla
    const slices = filled && total > 0 ? valid.map((r, i) => {
      const v = parseChartNumber(r.value);
      const frac = v / total;
      const a0 = angle;
      const a1 = angle + frac * 2 * Math.PI;
      angle = a1;
      const x0 = cx + rad * Math.cos(a0), y0 = cy + rad * Math.sin(a0);
      const x1 = cx + rad * Math.cos(a1), y1 = cy + rad * Math.sin(a1);
      const large = (a1 - a0) > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x0} ${y0} A ${rad} ${rad} 0 ${large} 1 ${x1} ${y1} Z`;
      const mid = (a0 + a1) / 2;
      const lx = cx + (rad * 0.6) * Math.cos(mid), ly = cy + (rad * 0.6) * Math.sin(mid);
      return { d, color: r.color || CHART_COLORS[i % CHART_COLORS.length], label: r.label, pct: Math.round(frac * 100), lx, ly };
    }) : [];
    return svgWrap(
      <>
        {filled ? (
          <>
            {slices.map((s, i) => <path key={i} d={s.d} fill={s.color} stroke="#fff" strokeWidth="1" />)}
            {slices.map((s, i) => s.pct >= 6 && <text key={`t${i}`} x={s.lx} y={s.ly} textAnchor="middle" fontSize="9" fill="#fff" fontWeight="bold" fontFamily="Times New Roman">%{s.pct}</text>)}
          </>
        ) : (
          <circle cx={cx} cy={cy} r={rad} fill="none" stroke="#000" strokeWidth="1.2" />
        )}
        {/* Lejant */}
        {valid.map((r, i) => (
          <g key={`l${i}`} transform={`translate(${W - padR - 70}, ${padT + i * 14})`}>
            <rect width="10" height="10" fill={r.color || CHART_COLORS[i % CHART_COLORS.length]} />
            <text x="14" y="9" fontSize="9" fontFamily="Times New Roman">{r.label}</text>
          </g>
        ))}
      </>
    );
  }

  return null;
};

const PdfPagePicker = ({ file, onPageSelected, onClose }) => {
  const [pages, setPages] = useState([]); // [{ pageNum, dataUrl }]
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [progress, setProgress] = useState({ done: 0, total: 0 });

  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      try {
        setLoading(true);
        const pdfjsLib = await loadPdfJs();
        const arrayBuffer = await file.arrayBuffer();
        if (cancelled) return;
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        if (cancelled) return;
        setProgress({ done: 0, total: pdf.numPages });

        const out = [];
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          if (cancelled) return;
          const page = await pdf.getPage(pageNum);
          // Yüksek kalite için 2x ölçek
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          if (cancelled) return;
          out.push({ pageNum, dataUrl: canvas.toDataURL('image/png') });
          setProgress({ done: pageNum, total: pdf.numPages });
          // Çok sayfalı PDF'lerde UI thread'i bloke etmemek için kısa break
          await new Promise(r => setTimeout(r, 0));
        }
        if (!cancelled) {
          setPages(out);
          setLoading(false);
        }
      } catch (e) {
        if (!cancelled) {
          setError(e.message || 'PDF okunamadı.');
          setLoading(false);
        }
      }
    };
    run();
    return () => { cancelled = true; };
  }, [file]);

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto">
      <div className="bg-white rounded-lg shadow-2xl max-w-4xl w-full p-4 sm:p-6 my-2 sm:my-4">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold text-slate-800">PDF Sayfası Seç</h3>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-700 text-2xl">×</button>
        </div>

        {loading && (
          <div className="text-center py-8">
            <div className="text-sm text-slate-600 mb-2">
              PDF okunuyor... {progress.total > 0 && `(${progress.done} / ${progress.total} sayfa)`}
            </div>
            {progress.total > 0 && (
              <div className="w-full bg-slate-200 rounded-full h-2 max-w-xs mx-auto">
                <div className="bg-slate-700 h-2 rounded-full transition-all" style={{ width: `${(progress.done / progress.total) * 100}%` }} />
              </div>
            )}
          </div>
        )}

        {error && (
          <div className="text-red-600 text-sm py-4 text-center">
            Hata: {error}
          </div>
        )}

        {!loading && !error && pages.length > 0 && (
          <>
            <div className="text-xs text-slate-600 mb-3">
              Kırpmak istediğin sayfaya tıkla:
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[60vh] overflow-y-auto">
              {pages.map(p => (
                <button
                  key={p.pageNum}
                  onClick={() => { onPageSelected(p.dataUrl); onClose(); }}
                  className="border-2 border-slate-200 rounded hover:border-blue-500 hover:shadow-lg transition-all p-2 bg-white"
                >
                  <img src={p.dataUrl} alt={`Sayfa ${p.pageNum}`} className="w-full h-auto block" />
                  <div className="text-xs text-slate-600 mt-1 text-center">Sayfa {p.pageNum}</div>
                </button>
              ))}
            </div>
          </>
        )}

        <div className="flex justify-end gap-2 mt-4">
          <button onClick={onClose} className="px-4 py-2 border border-slate-300 rounded hover:bg-slate-100">İptal</button>
        </div>
      </div>
    </div>
  );
};

const ImageCropper = ({ src, onCrop, onClose }) => {
  const [crop, setCrop] = useState({ x: 50, y: 50, w: 200, h: 150 });
  const [dragging, setDragging] = useState(null);
  const imgRef = useRef(null);
  const containerRef = useRef(null);

  // Mouse veya touch event'inden koordinat al
  const getCoords = (e) => {
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  };

  const handleMouseDown = (mode, e) => {
    e.preventDefault();
    const { x, y } = getCoords(e);
    setDragging({ mode, startX: x, startY: y, startCrop: { ...crop } });
  };

  useEffect(() => {
    const handleMove = (e) => {
      if (!dragging) return;
      // Touch'ta sayfa kaymasını engelle
      if (e.touches) e.preventDefault();
      const { x, y } = getCoords(e);
      const dx = x - dragging.startX;
      const dy = y - dragging.startY;
      const c = { ...dragging.startCrop };
      if (dragging.mode === 'move') {
        c.x += dx; c.y += dy;
      } else if (dragging.mode === 'br') {
        c.w += dx; c.h += dy;
      } else if (dragging.mode === 'tl') {
        c.x += dx; c.y += dy; c.w -= dx; c.h -= dy;
      } else if (dragging.mode === 'tr') {
        c.y += dy; c.w += dx; c.h -= dy;
      } else if (dragging.mode === 'bl') {
        c.x += dx; c.w -= dx; c.h += dy;
      }
      if (c.w < 20) c.w = 20;
      if (c.h < 20) c.h = 20;
      setCrop(c);
    };
    const handleUp = () => setDragging(null);
    if (dragging) {
      window.addEventListener('mousemove', handleMove);
      window.addEventListener('mouseup', handleUp);
      window.addEventListener('touchmove', handleMove, { passive: false });
      window.addEventListener('touchend', handleUp);
      window.addEventListener('touchcancel', handleUp);
    }
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleUp);
      window.removeEventListener('touchcancel', handleUp);
    };
  }, [dragging]);

  const performCrop = () => {
    const img = imgRef.current;
    if (!img) return;
    const scaleX = img.naturalWidth / img.clientWidth;
    const scaleY = img.naturalHeight / img.clientHeight;
    const canvas = document.createElement('canvas');
    canvas.width = crop.w * scaleX;
    canvas.height = crop.h * scaleY;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, crop.x * scaleX, crop.y * scaleY, crop.w * scaleX, crop.h * scaleY, 0, 0, canvas.width, canvas.height);
    onCrop(canvas.toDataURL('image/png'));
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto">
      <div className="bg-white rounded-lg shadow-2xl max-w-4xl w-full p-4 sm:p-6 my-2 sm:my-4">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold text-slate-800">Görseli Kırp</h3>
          <button onClick={onClose} className="text-slate-500 hover:text-slate-700 text-2xl">×</button>
        </div>
        <div className="text-xs text-slate-600 mb-2">Kırpma alanını sürükleyerek taşıyın, köşelerden boyutlandırın.</div>
        <div ref={containerRef} className="relative inline-block max-w-full overflow-hidden border border-slate-300" style={{ userSelect: 'none', touchAction: 'none' }}>
          <img ref={imgRef} src={src} alt="kırpılacak" className="max-w-full max-h-[60vh] block" draggable={false} />
          <div
            className="absolute border-2 border-blue-500 bg-blue-500/10 cursor-move"
            style={{ left: crop.x, top: crop.y, width: crop.w, height: crop.h, touchAction: 'none' }}
            onMouseDown={(e) => handleMouseDown('move', e)}
            onTouchStart={(e) => handleMouseDown('move', e)}
          >
            <div
              className="absolute w-4 h-4 bg-blue-500 -left-2 -top-2 cursor-nwse-resize"
              style={{ touchAction: 'none' }}
              onMouseDown={(e) => { e.stopPropagation(); handleMouseDown('tl', e); }}
              onTouchStart={(e) => { e.stopPropagation(); handleMouseDown('tl', e); }}
            />
            <div
              className="absolute w-4 h-4 bg-blue-500 -right-2 -top-2 cursor-nesw-resize"
              style={{ touchAction: 'none' }}
              onMouseDown={(e) => { e.stopPropagation(); handleMouseDown('tr', e); }}
              onTouchStart={(e) => { e.stopPropagation(); handleMouseDown('tr', e); }}
            />
            <div
              className="absolute w-4 h-4 bg-blue-500 -left-2 -bottom-2 cursor-nesw-resize"
              style={{ touchAction: 'none' }}
              onMouseDown={(e) => { e.stopPropagation(); handleMouseDown('bl', e); }}
              onTouchStart={(e) => { e.stopPropagation(); handleMouseDown('bl', e); }}
            />
            <div
              className="absolute w-4 h-4 bg-blue-500 -right-2 -bottom-2 cursor-nwse-resize"
              style={{ touchAction: 'none' }}
              onMouseDown={(e) => { e.stopPropagation(); handleMouseDown('br', e); }}
              onTouchStart={(e) => { e.stopPropagation(); handleMouseDown('br', e); }}
            />
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-4">
          <button onClick={onClose} className="px-4 py-2 border border-slate-300 rounded hover:bg-slate-100">İptal</button>
          <button onClick={performCrop} className="px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-900">Kırp ve Ekle</button>
        </div>
      </div>
    </div>
  );
};

// Tablo/grafik veri editörü
const CHART_TYPE_LABELS = {
  frequencyTable: 'Sıklık Tablosu',
  tallyTable: 'Çetele Tablosu',
  barChart: 'Sütun Grafiği',
  pieChart: 'Daire Grafiği',
  lineChart: 'Çizgi Grafiği',
  dotChart: 'Nokta Grafiği'
};

const ChartEditor = ({ chartType, onSave, onClose, initial }) => {
  const [title, setTitle] = useState(initial?.title ?? '');
  const [xLabel, setXLabel] = useState(initial?.xLabel ?? '');
  const [yLabel, setYLabel] = useState(initial?.yLabel ?? '');
  const [filled, setFilled] = useState(initial?.filled ?? true);
  const [rows, setRows] = useState(initial?.rows ?? [
    { label: 'A', value: 3, color: CHART_COLORS[0], values: [3, 2] },
    { label: 'B', value: 5, color: CHART_COLORS[1], values: [5, 4] },
    { label: 'C', value: 2, color: CHART_COLORS[2], values: [2, 6] }
  ]);
  // Çoklu seri (sadece sütun grafiğinde): seri listesi [{name, color}]
  const [series, setSeries] = useState(initial?.series ?? null);

  const type = initial?.chartType || chartType;
  const isTable = type === 'frequencyTable' || type === 'tallyTable';
  const isPie = type === 'pieChart';
  const usesColor = type === 'barChart' || type === 'pieChart' || type === 'dotChart';
  const canMultiSeries = type === 'barChart';
  const multiOn = canMultiSeries && Array.isArray(series) && series.length > 0;

  const addRow = () => setRows([...rows, {
    label: '', value: 0, color: CHART_COLORS[rows.length % CHART_COLORS.length],
    values: multiOn ? series.map(() => 0) : [0]
  }]);
  const updateRow = (i, patch) => setRows(rows.map((r, j) => j === i ? { ...r, ...patch } : r));
  const removeRow = (i) => setRows(rows.filter((_, j) => j !== i));

  // Çoklu seri aç/kapa
  const toggleMultiSeries = (on) => {
    if (on) {
      setSeries([{ name: 'Seri 1', color: CHART_COLORS[0] }, { name: 'Seri 2', color: CHART_COLORS[1] }]);
      // Her satıra values dizisi garantile
      setRows(rows.map(r => ({ ...r, values: r.values && r.values.length >= 2 ? r.values : [parseChartNumber(r.value), 0] })));
    } else {
      setSeries(null);
    }
  };
  const addSeries = () => {
    const ns = [...series, { name: `Seri ${series.length + 1}`, color: CHART_COLORS[series.length % CHART_COLORS.length] }];
    setSeries(ns);
    setRows(rows.map(r => ({ ...r, values: [...(r.values || []), 0] })));
  };
  const removeSeries = (si) => {
    if (series.length <= 1) return;
    setSeries(series.filter((_, j) => j !== si));
    setRows(rows.map(r => ({ ...r, values: (r.values || []).filter((_, j) => j !== si) })));
  };
  const updateSeries = (si, patch) => setSeries(series.map((s, j) => j === si ? { ...s, ...patch } : s));
  const updateRowValue = (i, si, val) => {
    setRows(rows.map((r, j) => {
      if (j !== i) return r;
      const vals = [...(r.values || [])];
      vals[si] = val;
      return { ...r, values: vals };
    }));
  };

  const handleSave = () => {
    onSave({ chartType: type, title, xLabel, yLabel, filled, rows, series: multiOn ? series : null });
    onClose();
  };

  const previewData = { chartType: type, title, xLabel, yLabel, filled, rows, series: multiOn ? series : null };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-2 sm:p-4 overflow-y-auto">

          </div>
          {!isPie && (
            <>
              <div>
                <label className="text-xs text-slate-600">{isTable ? 'Sol sütun başlığı' : 'X ekseni adı'}</label>
                <input type="text" value={xLabel} onChange={(e) => setXLabel(e.target.value)}
                  className="w-full border border-slate-300 rounded px-2 py-1 text-sm" placeholder={isTable ? 'Kategori' : 'örn: Meyve'} />
              </div>
              <div>
                <label className="text-xs text-slate-600">{isTable ? 'Sağ sütun başlığı' : 'Y ekseni adı'}</label>
                <input type="text" value={yLabel} onChange={(e) => setYLabel(e.target.value)}
                  className="w-full border border-slate-300 rounded px-2 py-1 text-sm" placeholder={isTable ? 'Sıklık' : 'örn: Adet'} />
              </div>

        {/* Çoklu seri seçeneği (sadece sütun grafiği) */}
        {canMultiSeries && (
          <div className="mb-3 p-2 bg-slate-50 border border-slate-200 rounded">
            <label className="flex items-center gap-2 text-sm">
              <input type="checkbox" checked={multiOn} onChange={(e) => toggleMultiSeries(e.target.checked)} />
              <span><b>Çoklu sütun</b> — her kategoride birden fazla sütun (örn. Kızlar / Erkekler)</span>
            </label>
            {multiOn && (
              <div className="mt-2 space-y-1">
                {series.map((s, si) => (
                  <div key={si} className="flex items-center gap-2">
                    <input type="text" value={s.name} onChange={(e) => updateSeries(si, { name: e.target.value })}
                      className="flex-1 border border-slate-300 rounded px-2 py-0.5 text-sm" placeholder={`Seri ${si+1} adı`} />
                    <input type="color" value={s.color} onChange={(e) => updateSeries(si, { color: e.target.value })}
                      className="w-8 h-7 border border-slate-300 rounded cursor-pointer" />
                    <button onClick={() => removeSeries(si)} disabled={series.length <= 1}
                      className="text-red-500 hover:text-red-700 disabled:opacity-30 p-1">
                      <Trash2 className="w-4 h-4" />
                    </button>
                  </div>
                ))}
                <button onClick={addSeries} className="text-xs px-2 py-1 border border-slate-300 rounded hover:bg-slate-100 flex items-center gap-1">
                  <Plus className="w-3 h-3" /> Seri ekle
                </button>
              </div>
            )}
          </div>
        )}

        {/* Veri satırları */}
        <div className="border border-slate-200 rounded p-2 mb-3">
          <div className="flex justify-between items-center mb-2">
            <span className="text-sm font-semibold">Veriler</span>
            <button onClick={addRow} className="text-xs px-2 py-1 bg-slate-700 text-white rounded hover:bg-slate-800 flex items-center gap-1">
              <Plus className="w-3 h-3" /> Satır ekle
            </button>
          </div>
          <div className="text-[11px] text-slate-400 mb-1">İpucu: Etikette LaTeX (<code className="bg-slate-100 px-1">$...$</code>) yazabilirsiniz. <b>Değer</b> kısmına <code className="bg-slate-100 px-1">5</code>, kesir <code className="bg-slate-100 px-1">1/3</code>, yüzde <code className="bg-slate-100 px-1">%25</code> veya ondalık <code className="bg-slate-100 px-1">0.4</code> yazabilirsiniz — grafik buna göre çizilir ve değer güzel gösterilir.</div>
          {/* Çoklu seri başlıkları */}
          {multiOn && (
            <div className="flex items-center gap-2 mb-1 text-xs text-slate-500 font-semibold">
              <span className="flex-1">Kategori</span>
              {series.map((s, si) => <span key={si} className="w-16 text-center">{s.name || `S${si+1}`}</span>)}
              <span className="w-7"></span>
            </div>
          )}
          {rows.map((r, i) => (
            <div key={i} className="flex items-center gap-2 mb-1">
              <input type="text" value={r.label} onChange={(e) => updateRow(i, { label: e.target.value })}
                className="flex-1 min-w-0 border border-slate-300 rounded px-2 py-0.5 text-sm" placeholder="Etiket (örn: Elma)" />
              {multiOn ? (
                series.map((s, si) => (
                  <input key={si} type="text" value={(() => { const x = (r.values || [])[si]; return (x === undefined || x === null || (typeof x === 'number' && isNaN(x)) || x === 'NaN') ? '' : x; })()}
                    onChange={(e) => updateRowValue(i, si, e.target.value)}
                    className="w-16 border border-slate-300 rounded px-2 py-0.5 text-sm" />
                ))
              ) : (
                <>
                  <input type="text" value={(r.value === undefined || r.value === null || (typeof r.value === 'number' && isNaN(r.value)) || r.value === 'NaN') ? '' : r.value} onChange={(e) => updateRow(i, { value: e.target.value })}
                    className="w-20 border border-slate-300 rounded px-2 py-0.5 text-sm" placeholder="Değer" />
                  {usesColor && (
                    <input type="color" value={r.color || CHART_COLORS[i % CHART_COLORS.length]} onChange={(e) => updateRow(i, { color: e.target.value })}
                      className="w-8 h-7 border border-slate-300 rounded cursor-pointer" title="Renk" />
                  )}
                </>
              )}
              <button onClick={() => removeRow(i)} className="text-red-500 hover:text-red-700 p-1">
                <Trash2 className="w-4 h-4" />
              </button>
            </div>
          ))}
        </div>

        {/* Önizleme */}
        <div className="border-2 border-slate-200 rounded p-3 mb-4 bg-white">
          <div className="text-xs text-slate-500 mb-2">Önizleme:</div>
          <ChartDisplay data={previewData} />
        </div>

        <div className="flex justify-end gap-2">
          <button onClick={onClose} className="px-4 py-2 border border-slate-300 rounded hover:bg-slate-100">İptal</button>
          <button onClick={handleSave} className="px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-900">Soruya Ekle</button>
        </div>
      </div>
    </div>
  );
};
